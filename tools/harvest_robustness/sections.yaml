# Harvest Robustness Harness -- section config.
#
# Each entry declares one section of the report. The harness runs the
# `script` via subprocess, captures stdout (and stderr if non-empty), and
# embeds the output under a markdown heading with the `title` and a brief
# `description`.
#
# 1.3.0-basket schema (2026-05-16): every analytic module now reads the
# per-bar parquet ledger at
#   TradeScan_State/backtests/<directive_id>_<basket_id>/raw/results_basket_per_bar.parquet
# The legacy reload+replay / events.jsonl reconstruction is gone. Baskets
# that pre-date the 1.3.0-basket emitter (no parquet on disk) appear as
# "SKIP" in the relevant sections and must be re-run through the pipeline
# to be analyzable.
#
# Field reference:
#   id:          short identifier (slug, used in CLI --sections filter)
#   title:       markdown H2 heading shown in report
#   description: 1-2 sentence operator-facing context, shown under heading
#   script:      path relative to repo root
#   kind:        currently always "stdout_capture" (subprocess + collate)
#   tags:        list of free-text tags for filtering (capital, dd, composite, etc.)

sections:

  - id: realized_metrics
    title: "1. Realized Metrics -- per-basket"
    description: >
      Per-basket realized PnL, REALIZED Max DD (NOT operator-facing -- only
      reflects closed-trade equity, ignores floating), profit factor,
      recycle event count, and harvest outcome. NOW augmented with the
      intra-bar Max DD from the 1.3.0-basket parquet ledger (intraDD column)
      where available. The intra-bar value is the operator-facing one;
      realized DD is cosmetic.
    script: tools/harvest_robustness/modules/h2_s08_results_extract.py
    kind: stdout_capture
    tags: [realized, ranking, per_basket]

  - id: intrabar_floating
    title: "2. TRUE Intra-Bar Floating Max DD -- per basket + composite"
    description: >
      Per-bar Max DD from the 1.3.0-basket parquet ledger emitted by the
      H2 rule at basket close. Spec-correct (basket_sim.py line 362/388
      "lot unchanged" on winner-realize) and internally consistent
      (equity_total_usd = stake + realized + floating per record).
      Composites cover B1, AJ, B2 singles + all 2-of-3 pairs + E1 triple.
      This is the authoritative source for intra-bar DD.
    script: tools/harvest_robustness/modules/h2_intrabar_floating_dd.py
    kind: stdout_capture
    tags: [floating, dd, intrabar, capital, authoritative]

  - id: composite_ranking
    title: "3. Composite Ranking -- capital efficiency + DD-safety"
    description: >
      All N-of-M composite combinations of available champions, ranked by
      PnL/DD (capital efficiency) and by DD%stake (capital safety). Answer
      to "B1+AJ vs B1+B2": both rankings agree on which composites win.
    script: tools/harvest_robustness/modules/h2_harvesters_composite_analysis.py
    kind: stdout_capture
    tags: [composite, ranking, capital, dd]

  - id: deployment_posture
    title: "4. Deployment Posture -- live capital requirement"
    description: >
      Per-basket and per-composite deployment-ready numbers: real capital
      required (max(peak_margin, 2*peak_dd) per FX_BASKET_RECYCLE_RESEARCH
      sec 4.15), margin buffer (closest the basket got to a broker margin
      call), DD multiple (peak_dd / stake), and ROC (return on deployed
      capital). For composites, shows both CapSum (naive sum-of-singles)
      and CapDiv (diversification-aware) so operator sees the diversification
      credit.
    script: tools/harvest_robustness/modules/h2_deployment_posture.py
    kind: stdout_capture
    tags: [deployment, capital, roc, headline]

  - id: at_event_floating
    title: "5. At-Recycle-Event Floating Profile"
    description: >
      Subordinate diagnostic -- floating_total_usd distribution at recycle_executed
      bars only (from parquet). Shows trigger-distribution and the gap
      between worst-at-event vs worst-overall floating (which reveals how
      much deeper the basket goes BETWEEN events; large gap = freeze gates
      letting the basket drift further than recycle triggers see).
    script: tools/harvest_robustness/modules/h2_floating_dd_at_events.py
    kind: stdout_capture
    tags: [floating, diagnostic, recycle, subordinate]
