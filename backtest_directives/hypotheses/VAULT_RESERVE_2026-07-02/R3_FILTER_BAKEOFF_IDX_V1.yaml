  directive: "69_MR_IDX_1D_RSIPULL_REGFILT_S01_V1_P00 E001 (run 51d49c9b, PF 1.74, 86tr, WATCH) + its 10-index sweep"
  rule: "RSI pullback + SMA200 gate"
