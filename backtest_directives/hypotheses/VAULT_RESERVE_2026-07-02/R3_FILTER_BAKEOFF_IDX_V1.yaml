id: R3_FILTER_BAKEOFF_IDX_V1
title: "Relaxed Connors R3 (RSI2 pullback) on 4 index CFDs — directional (SMA200) vs volatility filter bake-off"
class: mechanic
status: PROPOSED          # reserve — added to the 2026-07-02 snapshot from same-day StatOasis ingest
created: 2026-07-02
author: "agent (Claude Fable 5)"
supersedes: null

motivation: |
  From vault [[r3-index-cfd-filter-bakeoff]] (ingested 2026-07-02). Relaxed R3 entry:
  RSI(2) < 40 AND RSI(2) fell on >=2 of the last 4 bars; exit RSI(2) > 70 or 5-bar
  time cap; long-only on SPX500/NAS100/US30/US2000 (source's Midcap400 has no clean
  OctaFX CFD — dropped). Strict classic R3 (RSI2<10 chain) runs as the tight baseline.
  The test: does a FIXED volatility filter (e.g. ATR(5) rising) beat the classic
  SMA200 directional gate on average-trade — and do the two filters' equity curves
  decorrelate enough that the combined 4-index portfolio beats either single-filter
  book on Ret/DD?
  DELTA vs tested work: idea 69 IS nearly this base (RSI + SMA200, WATCH) — this
  hypothesis is a FILTER-ARM + PORTFOLIO extension of it, not a re-test; reuse its
  directive skeleton and cost model. Sibling of VOLFILTER_BAKEOFF_MR_IDX_V1 (same
  filter-category thesis, different base) — cross-inform, run one first.

