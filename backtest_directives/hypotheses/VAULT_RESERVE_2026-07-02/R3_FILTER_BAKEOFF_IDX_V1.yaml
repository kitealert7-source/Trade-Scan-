acceptance_criteria:
  primary_metric: ret_dd
  must_beat_baseline:
    avg_trade_r: "vol-filter arm > directional arm at similar win%"   # the source's central claim
  must_not_be_worse_on:
    survival: "not-BLOWN"
  # Portfolio stage: measured A-vs-B return correlation on a common calendar must be
  # low AND the combined book must beat either single-filter book on Ret/DD — else
  # keep the single best filter (parsimony). Relaxed-vs-strict entry comparison also
  # reported: if relaxation only adds trades without holding avg-R, keep strict.

evidence_required:
