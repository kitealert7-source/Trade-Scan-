id: NAS100_MIDNIGHT_BREAKOUT_V1
title: "NAS100 long-only intraday breakout anchored on midnight close, morning entry gate, EOD exit"
class: architecture
status: PROPOSED          # reserve — snapshotted from vault 2026-07-02, not yet scheduled
created: 2026-07-02
author: "agent (Claude Fable 5)"
supersedes: null

motivation: |
  From vault [[nas100-midnight-close-intraday-breakout]]. Long-only NAS100 intraday:
  (1) day filter — price must have exceeded the midnight close before 8AM NY;
  (2) entry — after 8AM NY, long when price > midnight close + N points; exit EOD.
  Exploits NASDAQ's structural long-breakout bias with a daily-context anchor.
  RISK FLAG (why this sits in reserve, not front of queue): the legacy re-validation
  arc concluded high-freq intraday was a UNIFORM COST-MIRAGE, and PSBRK gold showed
  multi-entry intraday churn is net-destructive. Two mitigations are pre-wired into
  the spec: first-breakout-only (one entry/day — the exact fix that flipped PSBRK's
  sign) and index-not-XAU instrument class. Acceptance is full-history survival, not
  recent-window PF. NOT previously tested (no midnight-anchor arc anywhere).

