title: "BTCUSD time-of-day seasonality — buy 21:00 UTC, sell 23:00 UTC, zero-parameter"
class: architecture
status: PROPOSED          # reserve — snapshotted from vault 2026-07-02, not yet scheduled
created: 2026-07-02
author: "agent (Claude Fable 5)"
