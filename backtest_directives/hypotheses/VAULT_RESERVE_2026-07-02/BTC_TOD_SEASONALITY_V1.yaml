motivation: |
  Zero-parameter calendar rule from vault [[btc-time-of-day-seasonality-cfd]] (source:
  Padysak/Vojtko — 33%/yr gross on Gemini spot 2015-2022). Buy BTCUSD 21:00 UTC, sell
  23:00 UTC daily. Economic story: 22-23 UTC is the only window all major exchanges are
  closed -> thin retail/Asia flow. Prior is SKEPTICAL: daily turnover x wide BTC-CFD
  spread + post-2022 maturation decay likely kill it — but it is zero-parameter and
  cheap to falsify. A clean negative is valuable; a positive is an uncorrelated bonus.
  NOT previously tested (RESEARCH_MEMORY has no BTC time-of-day arc; BTC work was
  IMPULSE 1H and SYMSEQ 4H — different mechanisms).

