                                       # outputs kc_upper/kc_lower/kc_pct_c/kc_width_c). 'kc_band_stretch' LANDED in _ALLOWED_PRIMITIVES 2026-07-02
                                       # (end-of-batch, operator pre-approved) — declarable now. Benchmarks keltner_channel + bollinger
                                       # already exist.
    architecture: { basket_id: null, legs: [ { symbol: SPX500, direction: long, lot: 0.01 } ] }
    stake_usd: TBD
