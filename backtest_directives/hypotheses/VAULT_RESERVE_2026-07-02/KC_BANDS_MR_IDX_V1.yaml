id: KC_BANDS_MR_IDX_V1
title: "KC Bands (EMA-of-H/L +/- ATR) MR entry on SPX500 1D — decorrelation bake-off vs BB/Keltner/incumbent triggers"
class: mechanic
status: PROPOSED          # reserve — added to the 2026-07-02 snapshot from same-day StatOasis ingest
created: 2026-07-02
author: "agent (Claude Fable 5)"
supersedes: null

motivation: |
  From vault [[kc-bands-mr-breakout-index-cfd]] (ingested 2026-07-02). "KC Bands" =
  upper EMA(High,n) / lower EMA(Low,n) +/- mult*ATR(a), 3-bar smoothed; MR entry
  close < lower band, exit close > upper band OR 5-bar cap. The thesis is EXPLICITLY
  NOT superiority: the source concedes it does not beat standard Bollinger Bands on
  aggregate expectancy. The claimed edge is REFERENCE-CHOICE DECORRELATION — same
  market, same rules, only the signal reference changed -> different losing years ->
  a low-correlation (<~0.3) equity stream that complements the index-MR book.
  Dedup note: the archived BB work was BB-on-SPREAD (cointegration z-series); this is
  bands-on-PRICE — different object entirely. The deliverable is a measured correlation
  matrix vs the incumbent RSI/IBS lines, not a PF headline.

