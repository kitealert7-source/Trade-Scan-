  directive: "incumbent index-MR book: idea 69 RSI (WATCH) + idea 70 IBS champion, matched windows"
  rule: TBD
  parquet_path: TBD
  key_metrics: { net_pct: TBD, max_dd_pct: TBD, ret_dd: TBD, stake_usd: TBD }

