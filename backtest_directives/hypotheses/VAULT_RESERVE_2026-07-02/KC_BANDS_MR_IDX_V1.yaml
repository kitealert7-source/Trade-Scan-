    rule_params:
      entry: close_lt_kc_lower
      exit: close_gt_kc_upper_or_5bar_cap
      band_smoothing: 1                # fix s=1 (no smoothing) to bound the grid
      params_from: plateau_not_peak
      timeframe: 1D
    # Arm B (%C stretch sweep) and Arm C (Width-C breakout/filter) run ONLY if Arm A
    # clears spread — staged, per the vault spec

acceptance_criteria:
  primary_metric: ret_dd
  must_beat_baseline:
    net_pct: "> 0 after spread"        # standalone survival first
  must_not_be_worse_on:
    survival: "not-BLOWN"
  # THE thesis test: realized daily-return correlation vs the RSI/IBS lines < ~0.3 at
  # comparable expectancy -> earns an ensemble slot. Correlation > ~0.5 -> redundant
  # reskin, REJECT regardless of PF. Underperforming IBS while correlated would also
  # CONFIRM the standing range-location > channel-reference prior — a useful negative.

evidence_required:
  class: single-window
  parity_gate: not_applicable
  reason: |
    Four-way bake-off (BB / Keltner / KC-Bands / incumbent trigger) on identical rules,
    sizing, window, and charged spread; correlation computed from run artifacts on a
    common calendar, not asserted from year tables.

