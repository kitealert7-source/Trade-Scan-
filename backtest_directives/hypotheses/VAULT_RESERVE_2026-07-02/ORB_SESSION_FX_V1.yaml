  token exists in the dictionary but no LORB arc appears in research memory.
  RISK FLAG: intraday cost-mirage finding applies (XAU/legacy corpus); FX majors have
  the tightest spreads in the universe, which is the one instrument class where an
  intraday edge could still clear costs — that IS the test. One entry per session,
  session_reset footgun checked at authoring.

