  From vault [[orb-session-window-fx-intraday]], FOLDING IN the companion filter idea
  [[daily-sma-regime-filter-intraday]] (a component, not a standalone strategy — it
  rides here as the host's trend gate). ORB: entry only on a break of the opening range
  within a defined session window (London or NY open), exit at end of session; daily
  close-vs-SMA(10/20) gate suppresses counter-trend entries.
  NOT previously tested as such: the archive has session-overlay work on COINTEGRATION
