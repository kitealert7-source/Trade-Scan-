acceptance_criteria:
  primary_metric: ret_dd
  must_beat_baseline:
    net_pct: "short arm > 0 after spread AND materially > long control"   # the asymmetry IS the finding
  must_not_be_worse_on:
    survival: "not-BLOWN"
  # Plateau requirement: edge must hold across a lookback range (+/-50-200%), not one
  # cell — a single-cell winner is a survivor of the source's 1,100-strategy search.

evidence_required:
  class: single-window
  parity_gate: not_applicable
  reason: |
    Charged full-history 1D run, short + long-control pair on identical windows. The
    long/short gap is the test; USD-regime gate is a durability add-on only if the base
