id: GBP_SHORTBIAS_OSC_V1
title: "GBPUSD 1D short-side structural bias — single-condition oscillator short (RSI primary, CCI check) vs long control"
class: architecture
status: PROPOSED          # reserve — added to the 2026-07-02 snapshot from same-day StatOasis ingest
