motivation: |
  From vault [[gbp-shortside-structural-bias-cfd]] (ingested 2026-07-02). The claim
  under test is the BIAS, not the indicator: GBP futures showed a directionally
  symmetric market where 24/26 robust single-condition strategies were SHORT — a
  structural short-side bias. Port: single-condition oscillator short on GBPUSD 1D
  (RSI-at-level primary — the source names RSI the best trigger for this instrument;
  CCI-at-level as the demonstrated cross-check; ATR-breakout short as third arm), with
  the identical LONG build as the symmetry control. No filter in the base.
  Corroboration: the archived two-bar-reversal FX arc independently found short-biased
  directions on GBP pairs by a completely different method. NOT previously tested as a
  standalone oscillator-short line. Sequencing note: the bias-confirmation census
  (step 1) is cheap and gates everything — if the futures bias doesn't transfer to
  OctaFX spot data, the arc dies before any strategy run.

