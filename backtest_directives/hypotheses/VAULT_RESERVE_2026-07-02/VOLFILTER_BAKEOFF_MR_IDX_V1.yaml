acceptance_criteria:
  primary_metric: ret_dd
  must_beat_baseline:
    ret_dd: "> unfiltered base on matched window, after spread, for at least one filter"
  must_not_be_worse_on:
    trade_count: ">= ~85% of base"     # filter-significance gate: meaningful cut, not sample starvation
    survival: "not-BLOWN"
  # Placebo control (vault's own guard): if a random ~10% trade removal improves ret_dd
  # comparably, the gate is doing the work, not the volatility content -> REJECT.
  # Portfolio stage (2-4 filter-variant legs) runs ONLY if >=2 filters individually pass.

evidence_required:
  class: single-window
  parity_gate: not_applicable
  reason: |
    Per-filter arms window-matched to the existing baseline runs; sample is already thin
    (86 trades on the RSI base) so per-leg verdicts are WATCH-grade at best — the IBS
    base (323 trades) is the denser substrate, prefer it.

