motivation: |
  From vault [[volatility-regime-filter-bakeoff-rsi2-mr-index-cfd]] (StatOasis, ingested
  2026-07-02). The tested SPX500 MR lines (idea 69 RSI WATCH, idea 70 IBS champion)
  carry a DIRECTION gate (SMA200) but NO volatility gate — a genuine untested filter
  category. Bake off three fixed, zero-free-parameter vol filters (ATR-rising,
  StdDev-rising, BB-width-expanding) one at a time on the existing base; then — the
  sharper claim — portfolio 2-4 legs of the SAME base differing only by filter
  (implementation-variant decorrelation). Filters stay FIXED, out of any optimizer.
  Sibling of R3_FILTER_BAKEOFF_IDX_V1 (same filter thesis, different base entry) —
  run whichever first; results cross-inform.

