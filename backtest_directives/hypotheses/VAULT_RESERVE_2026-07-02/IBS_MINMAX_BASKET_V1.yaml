id: IBS_MINMAX_BASKET_V1
title: "Cross-sectional IBS min-max basket — long lowest-IBS / short highest-IBS index CFD, 1-day hold"
class: architecture
status: PROPOSED          # reserve — snapshotted from vault 2026-07-02, not yet scheduled
created: 2026-07-02
author: "agent (Claude Fable 5)"
supersedes: null

motivation: |
  From vault [[ibs-minmax-basket-cfd]] (Pandey & Joshi country-ETF result, Sharpe
  ~2.9-3.9). Each day: long the OctaFX index CFD with the LOWEST IBS, short the one
  with the HIGHEST, enter at close, exit next close -> market-neutral stream.
  DELTA vs tested IBS work: ideas 70/71 used IBS as a single-instrument TIME-SERIES
  threshold (IBS<0.20). This is CROSS-SECTIONAL ranking across the index universe —
  a genuinely different mechanism (relative-value, market-neutral) never tested here.
  OctaFX swap-free = no carry on either leg; the gate is two-sided spread + the fact
  that our index CFDs are far more correlated than country ETFs. That correlation
  concern is the falsification target.

