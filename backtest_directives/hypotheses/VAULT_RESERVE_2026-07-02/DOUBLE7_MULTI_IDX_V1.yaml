motivation: |
  From vault [[equity-index-double7-multi-instrument-cfd]]. Connors Double 7: long when
  close < 7-day low, exit when close > 7-day high, gated by close > SMA(200). Run
  simultaneously on SPX500 + NAS100 (+ other OctaFX index CFDs): 7-day lows don't
  coincide across indices -> natural entry-timing diversification.
  Fits a SETTLED structural finding: daily index MR density is structural (~7-10
  trades/yr/index, RESEARCH_MEMORY 2026-06-20) and "the ONLY density-clearing path is
  multi-instrument aggregation". Double 7 is a different entry/exit pair from the
  tested RSI(4)/IBS lines (channel-low entry + channel-high EXIT, no oscillator) — a
  distinct MODEL, so it is not a repeat. Swap-free OctaFX = multi-day holds pay no carry.

