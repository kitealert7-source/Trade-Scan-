  From vault [[nq-dual-supertrend-60min-nas100-cfd]] (Ali Casey NQ port: $315k net,
  62% WR, 5.1 Ret/DD claimed on futures). Long when BOTH SuperTrends green AND price >
  SMA(200); exit when the fast SuperTrend flips red. Fast(ATR10, mult2) = signal,
  slow(ATR30, mult4) = confirmation — a scale-consistent indicator hierarchy speaking
  one language (ATR channel flips). Exploits NASDAQ's structural long bias.
  NOT previously tested: no SuperTrend primitive exists in the book (GMAFLIP arc closed
  with "replace slope-flip with a different trend primitive entirely" — this IS such a
  primitive, on a different symbol + TF, so it also answers that closed arc's
  forward-pointer). 1H trend with multi-day holds sits between the dead intraday
  scalps and the untested 4H/1D swing family on the cost spectrum; source claims
  survive-costs on futures, CFD spread is the open question.

