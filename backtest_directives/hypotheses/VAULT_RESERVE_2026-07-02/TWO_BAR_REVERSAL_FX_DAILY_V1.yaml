id: TWO_BAR_REVERSAL_FX_DAILY_V1
title: "Two-bar reversal pattern on DAILY FX (EURUSD/GBPUSD) with macro regime gate"
class: architecture
status: PROPOSED          # reserve — snapshotted from vault 2026-07-02, not yet scheduled
created: 2026-07-02
author: "agent (Claude Fable 5)"
supersedes: null

motivation: |
  From vault [[two-bar-reversal-pattern-fx]] (Ali Casey). Long setup: bar 2 is a
  down-bar closing below the prior bar's low; enter next bar on penetration of bar 2's
  high; exit on first profitable close or 10-bar time cap; macro regime gate against
  2008-2011-style bleed. Zero indicators, zero tuned parameters.
  DELTA vs tested work (this survives dedup ONLY on timeframe + gate): the archive has
  substantial two-bar-reversal FX work at 15M/1H/4H, where the USD_SYNTH Z-score
  extreme filter was a CONFIRMED edge enhancer and — critically — SMA(100)
  trend-following gates DESTROYED value at every TF tested. Daily TF is untested.
  Consequence baked into the spec: the vault's proposed generic "SPX monthly / SMA"
  macro gate is REPLACED by the already-validated USD_SYNTH |Z| extreme gate as the
  primary arm; a plain SMA-gated arm may run only as a falsification control.

baseline:
  directive: "archive two-bar reversal FX arcs (15M/1H/4H, USD_SYNTH-filtered) — no daily arm exists"
  rule: TBD
  parquet_path: TBD
  key_metrics: { net_pct: TBD, max_dd_pct: TBD, ret_dd: TBD, stake_usd: TBD }

variants:
  - id: TWO_BAR_REVERSAL_FX_DAILY_V1_P00
    rule: TBD
