    architecture: { basket_id: null, legs: [ { symbol: EURUSD, direction: both, lot: 0.01 } ] }
    stake_usd: TBD
    harvest_target_usd: TBD
    window: { start: 2016-06-01, end: latest }
    rule_params:
      pattern: two_bar_reversal      # close<open AND close<prior_low; entry on bar-2 high penetration
      exit: first_profitable_close
      time_cap_bars: 10
      macro_gate: usd_synth_z_extreme   # validated enhancer from the archive arc — NOT SMA
      timeframe: 1D
    # GBPUSD sibling = separate idea_id. F19: the archive arc is 15M/1H/4H — confirm no
    # prior DAILY NO_TRADES entry before authoring (none found at snapshot time).

acceptance_criteria:
  primary_metric: ret_dd
  must_beat_baseline:
    net_pct: "> 0"                   # charged, full 2016-2026
  must_not_be_worse_on:
    survival: "not-BLOWN"
  # Density expectation is LOW on daily (pattern is rare) — administrative FAIL on
  # trade count is acceptable; the question is whether the intraday edge family
  # transports to daily at all.

evidence_required:
  class: single-window
  parity_gate: not_applicable
  reason: |
    One charged full-history daily run on EURUSD with the USD_SYNTH gate. A same-window
    ungated arm quantifies the gate's contribution at daily TF (it was TF-consistent
    at 15M-4H; daily confirmation would extend that finding).

