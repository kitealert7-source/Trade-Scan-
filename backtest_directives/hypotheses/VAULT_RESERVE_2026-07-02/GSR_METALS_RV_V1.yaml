id: GSR_METALS_RV_V1
title: "Gold-Silver ratio (XAUUSD/XAGUSD synthetic 1D) — MR fade + breakout mirror; single-leg vs dollar-neutral 2-leg fork"
class: architecture
status: PROPOSED          # reserve — added to the 2026-07-02 snapshot from same-day StatOasis ingest
created: 2026-07-02
author: "agent (Claude Fable 5)"
supersedes: null

motivation: |
  From vault [[gsr-mean-reversion-metals-cfd]] (ingested 2026-07-02) — the vault's first
  relative-value/ratio idea. Trade GSR = XAUUSD close / XAGUSD close as a synthetic 1D
  series: fade percentile extremes (MR primary) with the breakout mirror as bake-off;
  EMA-cross on the ratio as alt signal. TWO direction builds, both required:
  (a) single-leg long-gold-on-signal (what the source actually measured), and
  (b) true 2-leg dollar-neutral spread (the RV interpretation the source did NOT test).
  NOT previously tested: the cointegration corpus is FX-centric z-score architecture —
  XAGUSD isn't in the screener universe and this is a RATIO with percentile bands, not
  a cointegration spread. A metals RV stream would be genuinely new diversification.
  Biggest structural risk: 2-leg entry+exit pays spread ~4x a single round-trip and
  XAGUSD spread is proportionally wide.

