acceptance_criteria:
  primary_metric: ret_dd
  must_beat_baseline:
    net_pct: "> 0 after BOTH legs' spread charged (2-leg build)"
  must_not_be_worse_on:
    survival: "not-BLOWN"
  # Not-really-RV guard: if build (a)'s returns correlate ~1 with plain long XAUUSD,
  # the ratio adds nothing — parsimony kills it. The RV claim stands only if build (b)
  # shows a distinct low-beta decorrelated stream vs the existing MR book.

evidence_required:
  class: single-window
  parity_gate: required
  reason: |
    Basket-architecture (2-leg synthetic) — parity gate applies to any in-process probe.
    Gross-vs-net R reported side by side; net is the only number that counts. The
    survivorship caveat is severe (source's figures are the top of a ~10k sweep over a
    metals bull) — full-history + sub-period (bull vs range) split is mandatory.

