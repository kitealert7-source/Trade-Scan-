---
id: H3_TREND_FOLLOW_V1
title: H3 trend-follow mechanic (inverse-H2 with bounded per-cycle loss)
class: mechanic
status: PROPOSED
created: 2026-05-17
author: operator
supersedes: null      # standalone; first hypothesis in the H3 lineage

motivation: |
  H2 mean-reversion accepts unbounded tail loss by design — the loser leg
  grows Martingale-style during sustained adverse moves (16-27× initial
  lot observed across the 10-window matrix; B2 BLOWN UP in COVID-era
  window B). Even on the operational P00 window, B2's loser reached 0.18
  lot — invisible 18× exposure beneath a deceptively low 33% realized DD.

  Per-event economics analysis (research §4.21) showed H2 banks ~$0.40
  of cash per $1 of unrealized loss inherited; 76-85% of recycle events
  are "trading cash for more exposure" trades, not edge-positive. The
  strategy depends on rare reversal events for ~60% of profitability
  (15-24% of events generate the bulk of P&L). When reversal doesn't
  come (trending regime), the mechanic compounds the loss.

  The structural inversion: pyramid the WINNER on the SAME data that
  bled H2's loser. Hold the loser at fixed 0.01 as a tripwire — the
  loser's floating PnL becomes a clean trend-distance integrator. Add
  to winner each $10 of new loss on loser (uniformly pip-spaced
  pyramiding). Exit when loser recovers $10 from trough (regime flip
  signal). Per-cycle loss bounded at ~$10 plus brokerage by construction
  (~$11-12 total = 1.1% of $1k stake). Convex payoff: bounded downside
  + uncapped upside via pyramid capture during sustained trends.

  Anti-Martingale dominates Martingale on risk-adjusted terms — heavy
  position is held only on proven trend, not on hope. Same data, flipped
  bet, fundamentally different tail-risk profile.

baseline:
  directive: 90_PORT_H2_5M_RECYCLE_S14_V1_P00
  rule: H2_recycle@4
  parquet_path: ../TradeScan_State/backtests/90_PORT_H2_5M_RECYCLE_S14_V1_P00_H2/raw/results_basket_per_bar.parquet
  key_metrics:
    net_pct: 59.95
    max_dd_pct: 32.51
    ret_dd: 1.84
    stake_usd: 1000

variants:
  - id: H3_V1_P00
    rule: H2_recycle@5
    rule_build_required: true   # built in commit ede5333
    architecture:
      basket_id: H2
      legs:
        - { symbol: EURUSD, direction: long, lot: 0.01 }
        - { symbol: USDJPY, direction: long, lot: 0.01 }
    stake_usd: 1000
    harvest_target_usd: 2000
    window:
      start: 2024-09-02
      end:   2026-05-09
    rule_params:
      # Add to winner each $10 of new loss on loser (uniformly pip-spaced)
      add_trigger:     loser_floating_new_low_$10
      add_target:      winner_leg
      add_lot:         0.01
      # Loser held at 0.01 as tripwire + trend-distance sensor
      loser_pinned:    true
      # Exit when loser recovers $10 from trough (regime flip)
      exit_trigger:    loser_floating_recovers_$10_from_trough
      # Hard floor (defensive — should never fire if exit_trigger working)
      hard_floor_loss: -10.0       # basket floating ≤ -$10 hard exit
      # Re-entry: fresh 0.01 + 0.01 on next bar
      reentry:         fresh_1_to_1_next_bar
      # Regime gate inverted: pyramid only in trending regimes
      regime_gate:     "compression_5d <= 5"
      # OR a stretch-Z gate; finalize during /port-strategy build
      regime_gate_alt: "|stretch_z20| >= 1.0"
    decision:                    # post-execution slot (2026-05-17 F-window)
      directive_id:    90_PORT_H2_5M_RECYCLE_S16_V1_P00
      outcome:         INCONCLUSIVE
      reasoning: |
        Bounded-loss design works: DD cut 73% (32.51% → 8.76% vs @4
        baseline). But ret_dd (1.81) misses primary metric threshold
        (>1.84) by 0.03. Hard floor fired 23 times vs 14 recovery exits
        — defensive floor became dominant exit mechanism, not rare backup.
        Diagnostic traced to PIP-VALUE ASYMMETRY: EURUSD-winner cycles
        die at hard floor 72.7% of the time vs 46.7% for USDJPY-winner
        cycles, because EUR-heavy pyramid (0.06+ lot) reverses ~1.55x
        faster per pip than JPY-heavy pyramid (1:1 ratio's $0.10 vs
        $0.067/pip mismatch). Same-mechanic + different-architecture
        variant H3_V2_P00 (2:3 ratio) tests the parity fix.
      canonical_metrics:
        net_pct: 15.88
        max_dd_pct: 8.76
        ret_dd: 1.81
        recycle_events: 0
        pyramids: 45
        liq_recovery: 14
        liq_floor: 23

  # ===== V2 variant: 2:3 ratio for pip-value parity =====
  # Same mechanic (H2_recycle@5), different leg lots. Loser sensor pip-
  # value parity ($0.20/pip both sides). Reduces EUR/JPY asymmetry from
  # 1.49x (at init) to 1.0x — within-cycle drift remains as winner
  # pyramids grow, but loser-sensor and pyramid-trigger spacing are
  # now perfectly symmetric.
  - id: H3_V2_P00
    rule: H2_recycle@5
    rule_build_required: false   # H2_recycle@5 already exists from V1 build
    architecture:
      basket_id: H2
      legs:
        - { symbol: EURUSD, direction: long, lot: 0.02 }
        - { symbol: USDJPY, direction: long, lot: 0.03 }
    stake_usd: 1000
    harvest_target_usd: 2000
    window:
      start: 2024-09-02
      end:   2026-05-09
    rule_params:
      # Same V5 params as V1 — only the architecture (leg lots) changes
      add_trigger:     loser_floating_new_low_$10
      add_target:      winner_leg
      add_lot:         0.01
      loser_pinned:    true
      exit_trigger:    loser_floating_recovers_$10_from_trough
      hard_floor_loss: -10.0
      reentry:         fresh_2_to_3_next_bar
      regime_gate:     "compression_5d <= 5"
    rationale: |
      Pip-value parity at initialization:
        EURUSD 0.02 lot = 0.02 × 100k × 0.0001 = $0.20/pip
        USDJPY 0.03 lot (@ price 150) = 0.03 × 100k × 0.01 / 150 = $0.20/pip
      → loser sensor is SYMMETRIC ($10 = 50 pips either direction)
      → first pyramid trigger fires at identical trend-distance both ways
      → initial winner gain is identical both ways
      Some asymmetry remains as winner pyramid grows (winner lot grows
      by 0.01 per add — EUR-side $/pip impact grows faster than JPY-side
      after enough pyramids), but the dominant first-cycle asymmetry
      is gone. Hard-floor firings should equalize between EUR-winner
      and JPY-winner cycles. Testing on same window as V1 for direct
      comparison.
    decision:
      directive_id:    90_PORT_H2_5M_RECYCLE_S17_V1_P00
      outcome:         INCONCLUSIVE
      reasoning: |
        Pip-value parity at init confirmed: absolute hard-floor rate
        dropped on both sides (EUR-winner 72.7%→63.5%, JPY-winner
        46.7%→39.5%) — both improved by ~9pp. But EUR/JPY ratio stayed
        ~1.6x (within-cycle pyramid drift dominates the residual).
        Net% doubled (+15.88%→+31.70%) but DD% also doubled
        (8.76%→19.08%) — ret_dd actually DEGRADED to 1.66 (vs V1 1.81)
        because the basket is 2.5x bigger total exposure but the hard
        floor stayed at -$10 (relatively tighter). Diagnostic: floor
        needs to scale with exposure. V3-V6 sweep tests floor at
        -15/-20/-25/-30.
      canonical_metrics:
        net_pct: 31.70
        max_dd_pct: 19.08
        ret_dd: 1.66
        pyramids: 262
        liq_recovery: 98
        liq_floor: 114

