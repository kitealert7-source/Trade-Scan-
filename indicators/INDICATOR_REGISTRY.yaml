      annotated with O(n) governance comment confirming no nested loops'
    - 'datetime_index_guards: linreg_regime_htf and session_range_structure already
      had explicit guards — confirmed in place, no changes required'
    - 'external_dependency_isolation: usd_stress_index path moved to USD_SYNTH_PATH
      module constant; descriptive FileNotFoundError with rebuild instructions added'
    - output_scale fields added to all percentile-style indicators in registry metadata
  version_3:
    date: '2026-03-09'
    changes:
    - 'taxonomy_reorganisation: roc, rsi, stochastic, ultimate_c_percent moved from
      indicators/price/ to indicators/momentum/'
    - 'module_path_updates: four indicators updated from indicators.price.* to indicators.momentum.*'
    - 'new_indicator: stochastic_momentum_index added to indicators/momentum/'
    - 'category_field_added: all 33 indicators now carry a category field (price|momentum|trend|structure|volatility|stats|composite)
      matching directory structure'
    - 'registry_summary_updated: total_indicators=33, momentum_count=5'
    - 'price_init_cleanup: indicators/price/__init__.py updated to remove moved indicators;
      indicators/momentum/__init__.py created'
  version_4:
    date: '2026-03-14'
    changes:
    - 'new_indicators: log_return_autocorr and realized_vol added to support the State
      Machine Regime Model upgrade'
    - 'registry_summary_updated: total_indicators=35, statistical_count=4, volatility_count=6'
