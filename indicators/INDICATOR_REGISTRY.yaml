# INDICATOR REGISTRY (Automated Summary)
governance_updates:
  version_2:
    date: '2026-03-01'
    changes:
    - 'column_normalization: kalman_regime and sha_regime now accept lowercase open/high/low/close
      (engine standard) with capitalized fallback and explicit ValueError'
    - 'percentile_scale_enforcement: atr_percentile now raises RuntimeError if output
      exceeds 1.0001 (0–1 scale); rolling_percentile already had 0–100 invariant guard'
