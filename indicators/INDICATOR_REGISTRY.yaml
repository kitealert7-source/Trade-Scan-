    parameters:
      window: int — rolling lookback for percentile
    default_parameters:
      window: 100
    output_type: Series
    output_columns:
      - atr_percentile: float — percentile rank of ATR within window (0.0–1.0)
    output_scale: "0-1 (multiply by 100 for percentage comparison)"
