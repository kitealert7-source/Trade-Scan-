  atr:
    module_path: indicators.volatility.atr
    function_name: atr
    classification: Volatility
    input_requirements:
      - df: DataFrame with columns [high, low, close]
      - window: int
    parameters:
      window: int — ATR period (Wilder's RMA)
    default_parameters: {}
    output_type: Series
    output_columns:
      - atr: float — Average True Range
    output_scale: "price units (unbounded positive)"
    lookahead_safe: true
    rolling_window_used: No
    vectorized: Yes
    htf_compatible: Yes
    dependency_indicators: []
    typical_use_case: >
      Core volatility measurement. Input to atr_percentile and volatility_regime.
    notes: "Uses ewm(alpha=1/window, adjust=False) — true Wilder's RMA."
    compatibility:
      suitable_for_intraday: Yes
      suitable_for_daily: Yes
      computational_cost: Low
      risk_of_overfitting: Low

  # ---------------------------------------------------------------------------
