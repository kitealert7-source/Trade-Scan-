  # ---------------------------------------------------------------------------
  # volatility/market_state.py
  # ---------------------------------------------------------------------------
  market_state:
    module_path: indicators.volatility.market_state
    function_name: market_state
    classification: Composite
    input_requirements:
      - trend_slope: pd.Series — slope from linreg_regime (or equivalent)
      - volatility_percentile: pd.Series — ATR percentile (0–1 scale from atr_percentile)
    parameters:
      slope_thresh: float — absolute slope threshold for trending
      vol_low: float — low-volatility percentile ceiling
      vol_high: float — high-volatility percentile floor
    default_parameters:
      slope_thresh: 0.0
      vol_low: 0.3
      vol_high: 0.7
    output_type: DataFrame
    output_columns:
      - state: int — composite market state (see notes)
    output_scale: "state codes: 0=undefined, 1=trending_up, 2=trending_down, 3=range_low_vol, 4=range_high_vol"
    lookahead_safe: true
    rolling_window_used: No
    vectorized: Yes
    htf_compatible: Yes
    dependency_indicators:
      - linreg_regime  # provides trend_slope
      - atr_percentile  # provides volatility_percentile
    typical_use_case: >
      Composite market regime: combines trend direction + volatility level
      into a single state for strategy gating.
    compatibility:
      suitable_for_intraday: Yes
      suitable_for_daily: Yes
      computational_cost: Low
      risk_of_overfitting: Medium

