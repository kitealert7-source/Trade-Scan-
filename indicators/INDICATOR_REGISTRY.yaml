    compatibility:
      suitable_for_intraday: Yes
      suitable_for_daily: Yes
      computational_cost: Medium
      risk_of_overfitting: Low

  # ---------------------------------------------------------------------------
  # trend/linreg_regime_htf.py
  # ---------------------------------------------------------------------------
  linreg_regime_htf:
    module_path: indicators.trend.linreg_regime_htf
    function_name: linreg_regime_htf
    classification: Regime
    input_requirements:
      - series: pd.Series with DatetimeIndex (intraday close)
    datetime_index_required: true
    datetime_index_guard: "raises ValueError if not isinstance(series.index, pd.DatetimeIndex)"
    parameters:
      window: int — rolling window for daily regression
    default_parameters:
      window: 50
    output_type: DataFrame
    output_columns:
      - trend: float — daily rolling mean (forward-filled to intraday)
      - slope: float — daily regression slope (forward-filled)
      - regime: int — 1 (uptrend), -1 (downtrend), 0 (warmup)
    output_scale: "trend: price units; slope: price/bar; regime: -1/0/1"
    lookahead_safe: true
    rolling_window_used: Yes
    vectorized: Yes
    htf_compatible: Yes
    dependency_indicators:
      - linreg_regime  # same algorithm, applied to daily resampled close
    typical_use_case: >
      Daily trend context injected into intraday strategies. 1-day lag prevents lookahead.
    compatibility:
      suitable_for_intraday: Yes
      suitable_for_daily: No
      computational_cost: Medium
      risk_of_overfitting: Low

  # ---------------------------------------------------------------------------
  # trend/sha_regime.py
  # ---------------------------------------------------------------------------
  sha_regime:
    module_path: indicators.trend.sha_regime
    function_name: sha_regime
    classification: Regime
    input_requirements:
      - df: DataFrame with columns [open, high, low, close] (lowercase preferred) or [Open, High, Low, Close] (fallback)
    column_naming:
      standard: lowercase open/high/low/close (engine convention)
      fallback: capitalized Open/High/Low/Close
      error: "ValueError raised if neither found"
    parameters:
      smooth: int — smoothing window for HA open
    default_parameters:
      smooth: 3
    output_type: DataFrame
    output_columns:
      - trend: float — smoothed Heikin-Ashi close
      - regime: int — 1 (HA rising), -1 (HA falling), 0 (first bar)
    output_scale: "trend: price units; regime: -1/0/1"
    lookahead_safe: true
    rolling_window_used: No
    vectorized: No
    loop_complexity: "O(n) — HA open construction inherently sequential, annotated"
    htf_compatible: Yes
    dependency_indicators: []
    typical_use_case: >
      Smoothed Heikin-Ashi trend regime. Lower noise than raw price regime.
    compatibility:
      suitable_for_intraday: Yes
      suitable_for_daily: Yes
      computational_cost: Medium
      risk_of_overfitting: Low

  # ---------------------------------------------------------------------------
  # trend/trend_persistence.py
  # ---------------------------------------------------------------------------
  trend_persistence:
    module_path: indicators.trend.trend_persistence
    function_name: trend_persistence
    classification: Regime
    input_requirements:
      - series: pd.Series
    parameters:
      window: int — rolling window
      threshold: float — directional consistency threshold
    default_parameters:
      window: 20
      threshold: 0.7
    output_type: DataFrame
    output_columns:
      - persistence: float — max(up_frac, down_frac) in window
      - regime: int — 1 (persistent up), -1 (persistent down), 0 (mixed)
    output_scale: "persistence: 0-1; regime: -1/0/1"
    lookahead_safe: true
    rolling_window_used: Yes
    vectorized: Yes
    htf_compatible: Yes
    dependency_indicators: []
    typical_use_case: >
      Confirms trend via directional consistency. Complements linreg_regime.
    compatibility:
      suitable_for_intraday: Yes
      suitable_for_daily: Yes
      computational_cost: Low
      risk_of_overfitting: Low


