    output_scale: 'swing_high/swing_low: price units; lh_streak/hl_streak: non-negative int; choch_event: -1/0/1'
    lookahead_safe: true
    rolling_window_used: true
    vectorized: false
    loop_complexity: O(n) — streak counters require sequential state (annotated)
    htf_compatible: true
    dependency_indicators:
    - highest_high
    - lowest_low
    typical_use_case: 'Stage 1 of two-stage CHOCH API. Detects structural failure: close beyond a mature swing level after
      MIN_SWINGS consecutive lower-highs (bullish CHOCH) or higher-lows (bearish CHOCH). Must be called before apply_choch_state.

      '
    compatibility:
      suitable_for_intraday: true
      suitable_for_daily: true
      computational_cost: Medium
      risk_of_overfitting: Medium
    lookback: 20
    warmup: 23
    input_columns:
    - high
    - low
    - close
  apply_choch_state:
    module_path: indicators.structure.choch
    category: structure
    function_name: apply_choch_state
    classification: Structure
    input_requirements:
    - df: DataFrame with 'choch_event' column (output of compute_choch_state)
    parameters:
      persistence_bars: int — bars a CHOCH event remains active after the event bar
    default_parameters:
      persistence_bars: 15
    output_type: DataFrame
    output_columns:
    - choch_active: bool — True while within persistence window after a CHOCH event
    - choch_direction: int — +1 bullish / -1 bearish / 0 inactive
    - choch_bars_since: int — bars elapsed since last CHOCH event (-1 if never triggered)
    output_scale: 'choch_direction: -1/0/1; choch_bars_since: int (-1=never triggered, 0+=bars elapsed since last event)'
    lookahead_safe: true
    rolling_window_used: false
    vectorized: false
    loop_complexity: O(n) — persistent state window requires sequential state (annotated)
    htf_compatible: true
    dependency_indicators:
    - compute_choch_state
    typical_use_case: 'Stage 2 of two-stage CHOCH API. Converts discrete CHOCH events into a persistent directional context
      window. Use choch_active + choch_direction as entry filters. Requires compute_choch_state() to be called first.

      '
    compatibility:
      suitable_for_intraday: true
      suitable_for_daily: true
      computational_cost: Low
      risk_of_overfitting: Low
    lookback: persistence_bars
    warmup: 23
    input_columns:
    - choch_event
  usd_synth_zscore:
    module_path: indicators.macro.usd_synth_zscore
    category: macro
    function_name: usd_synth_zscore
    classification: Macro Filter
    input_requirements:
    - df: DataFrame with 'time' (or first col) and 'close' columns
    - external: USD_SYNTH_CLOSE_PATH constant (data_root/SYSTEM_FACTORS/USD_SYNTH/usd_synth_close_d1.csv)
    parameters:
      lookback: int (default 100) — rolling Z-score window in days
      threshold: float (default 1.5) — minimum |Z| for signal
    default_parameters:
      lookback: 100
      threshold: 1.5
    output_type: DataFrame
    output_columns:
    - usd_z_score: float — rolling Z-score of USD_SYNTH (lookback-day window)
    - macro_allowed: int — +1 (longs only), -1 (shorts only), 0 (no trade)
    output_scale: 'usd_z_score: unbounded float (-3 to +3 typical); macro_allowed: {-1, 0, +1}'
    lookahead_safe: true
    rolling_window_used: true
    vectorized: true
    htf_compatible: true
    external_dependency:
      path_constant: USD_SYNTH_CLOSE_PATH
      default_location: data_root/SYSTEM_FACTORS/USD_SYNTH/usd_synth_close_d1.csv
      rebuild_command: python engines/ops/build_usd_synth.py (in DATA_INGRESS repo)
    dependency_indicators:
    - USD_SYNTH dataset (external)
    typical_use_case: 'Mean-reversion macro direction filter for FX strategies. Auto-detects pair correlation with USD_SYNTH:
      directional filter on USD pairs (corr 0.7-0.85), macro volatility regime gate on non-USD crosses (corr 0.05-0.24). 1-day
      lag prevents lookahead.

      '
    compatibility:
      suitable_for_intraday: true
      suitable_for_daily: true
      computational_cost: Medium
      risk_of_overfitting: Low
    lookback: 100
    warmup: 101
    input_columns:
    - time
    - close
  jpy_synth_zscore:
    module_path: indicators.macro.jpy_synth_zscore
    category: macro
    function_name: jpy_synth_zscore
    classification: Macro Filter
    input_requirements:
    - df: DataFrame with 'time' (or first col) and 'close' columns
    - external: JPY_SYNTH_CLOSE_PATH constant (data_root/SYSTEM_FACTORS/JPY_SYNTH/jpy_synth_close_d1.csv)
    parameters:
      lookback: int (default 100) — rolling Z-score window in days
      threshold: float (default 1.5) — minimum |Z| for signal
    default_parameters:
      lookback: 100
      threshold: 1.5
    output_type: DataFrame
    output_columns:
    - jpy_z_score: float — rolling Z-score of JPY_SYNTH (lookback-day window)
    - jpy_macro_allowed: int — +1 (longs only), -1 (shorts only), 0 (no trade)
    output_scale: 'jpy_z_score: unbounded float (-3 to +3 typical); jpy_macro_allowed: {-1, 0, +1}'
    lookahead_safe: true
    rolling_window_used: true
    vectorized: true
    htf_compatible: true
    external_dependency:
      path_constant: JPY_SYNTH_CLOSE_PATH
      default_location: data_root/SYSTEM_FACTORS/JPY_SYNTH/jpy_synth_close_d1.csv
      rebuild_command: python engines/ops/build_jpy_synth.py (in DATA_INGRESS repo)
    dependency_indicators:
    - JPY_SYNTH dataset (external)
    typical_use_case: 'Mean-reversion macro direction filter for FX strategies. Rising JPY_SYNTH = JPY strengthening (risk-off).
      Auto-detects pair correlation: directional filter on JPY-quote pairs, regime gate on non-JPY crosses. 1-day lag prevents
      lookahead.

      '
    compatibility:
      suitable_for_intraday: true
      suitable_for_daily: true
      computational_cost: Medium
      risk_of_overfitting: Low
    lookback: 100
    warmup: 101
    input_columns:
    - time
    - close
  hurst_rs:
    module_path: indicators.trend.hurst_rs
    category: trend
    function_name: hurst_rs
    classification: Regime
    input_requirements:
    - series: pd.Series of prices (typically close)
    parameters:
      window: int — rolling R/S analysis window in bars (default 100)
    default_parameters:
      window: 100
    output_type: Series
    output_columns:
    - hurst: float — R/S Hurst exponent (typical range 0.0-1.0)
    output_scale: 0.0-1.0 (typical, theoretical 0-1)
    lookahead_safe: true
    rolling_window_used: true
    vectorized: false
    htf_compatible: true
    dependency_indicators: []
    typical_use_case: 'Faithful Pine v1.2 R/S Hurst port. Used as a regime persistence gate where threshold > 0.5 captures
      trending regimes, < 0.5 captures mean-reverting. Different from hurst_regime (lag-variance scaling) - R/S and lag-variance
      produce different absolute Hurst values for the same data. Use this module when calibrating against a Pine R/S baseline.

      '
    notes: 'Algorithm: log returns -> rolling window -> mean -> cumulative deviation -> R (range) / S (std) -> log(R/S) /
      log(N). Population std (ddof=0) matches Pine. Returns 0.5 (neutral) for warmup, NaN windows, or numerical edge cases.

      '
    compatibility:
      suitable_for_intraday: true
      suitable_for_daily: true
      computational_cost: Medium
      risk_of_overfitting: Medium
    lookback: window
    warmup: window
    input_columns:
    - close
  adx_wilder:
    module_path: indicators.structure.adx_wilder
    category: structure
    function_name: adx_wilder
    classification: Trend
    input_requirements:
    - high: pd.Series of high prices
    - low: pd.Series of low prices
    - close: pd.Series of close prices
    parameters:
      period: int — lookback period (default 14, Wilder standard)
    default_parameters:
      period: 14
    output_type: Series
    output_columns:
    - adx_wilder: float — ADX value (0-100 scale, higher = stronger trend)
    output_scale: 0-100
    lookahead_safe: true
    rolling_window_used: true
    vectorized: true
    htf_compatible: true
    dependency_indicators: []
    typical_use_case: 'Faithful Pine ta.adx() / ta.dmi() port using Wilder RMA smoothing (alpha = 1/period). Use for trend-strength
      gating with thresholds calibrated against Pine baselines (typically 15-25 for "trending"). Different from indicators.structure.adx
      which uses EMA span (alpha = 2/(n+1)) and requires higher thresholds to achieve same selectivity.

      '
    notes: 'Wilder''s RMA reacts ~2x slower than EMA span at the same period. Pine "ADX > 15" (Wilder''s) is roughly equivalent
      to EMA-ADX "ADX > 20-25" on the same data. All four smoothing steps (TR, +DM, -DM, ADX) use Wilder''s. min_periods=period
      for clean warmup.

      '
    compatibility:
      suitable_for_intraday: true
      suitable_for_daily: true
      computational_cost: Low
      risk_of_overfitting: Medium
    lookback: period
    warmup: period
    input_columns:
    - high
    - low
    - close
