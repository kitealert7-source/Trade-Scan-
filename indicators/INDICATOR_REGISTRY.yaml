governance_updates:
  version_2:
    date: '2026-03-01'
    changes:
    - 'column_normalization: kalman_regime and sha_regime now accept lowercase open/high/low/close (engine standard) with
      capitalized fallback and explicit ValueError'
    - 'percentile_scale_enforcement: atr_percentile now raises RuntimeError if output exceeds 1.0001 (0–1 scale); rolling_percentile
      already had 0–100 invariant guard'
    - 'loop_audit: candle_state, kalman_regime, sha_regime, hull_moving_average all annotated with O(n) governance comment
      confirming no nested loops'
    - 'datetime_index_guards: linreg_regime_htf and session_range_structure already had explicit guards — confirmed in place,
      no changes required'
    - 'external_dependency_isolation: usd_stress_index path moved to USD_SYNTH_PATH module constant; descriptive FileNotFoundError
      with rebuild instructions added'
    - output_scale fields added to all percentile-style indicators in registry metadata
  version_3:
    date: '2026-03-09'
    changes:
    - 'taxonomy_reorganisation: roc, rsi, stochastic, ultimate_c_percent moved from indicators/price/ to indicators/momentum/'
    - 'module_path_updates: four indicators updated from indicators.price.* to indicators.momentum.*'
    - 'new_indicator: stochastic_momentum_index added to indicators/momentum/'
    - 'category_field_added: all 33 indicators now carry a category field (price|momentum|trend|structure|volatility|stats|composite)
      matching directory structure'
    - 'registry_summary_updated: total_indicators=33, momentum_count=5'
    - 'price_init_cleanup: indicators/price/__init__.py updated to remove moved indicators; indicators/momentum/__init__.py
      created'
  version_4:
    date: '2026-03-14'
    changes:
    - 'new_indicators: log_return_autocorr and realized_vol added to support the State Machine Regime Model upgrade'
    - 'registry_summary_updated: total_indicators=35, statistical_count=4, volatility_count=6'
  version_5:
    date: '2026-04-02'
    changes:
    - 'new_indicator: compute_choch_state added to indicators/structure/choch.py — Stage 1 CHOCH structural event detection
      (swing streaks + close-beyond-mature-level)'
    - 'new_indicator: apply_choch_state added to indicators/structure/choch.py — Stage 2 persistent context window (choch_active,
      choch_direction, choch_bars_since)'
    - 'linreg_regime_htf: resample_freq parameter added (v1.5.4 adaptive regime TF); now accepts pd.DataFrame with timestamp+close
      columns in addition to pd.Series; datetime_index_required downgraded to false (index constructed from column when needed)'
    - 'hurst_regime: input_requirements corrected — accepts close price series; log-price conversion handled internally; output_columns
      and output_scale annotations added'
    - 'registry_summary_updated: total_indicators=39, structure_count=8'
  version_6:
    date: '2026-04-09'
    changes:
    - 'new_category: macro — indicators/macro/ directory for exogenous macro factor filters'
    - 'new_indicator: usd_synth_zscore added to indicators/macro/usd_synth_zscore.py — USD synthetic index Z-score direction
      filter with auto-correlation pair detection'
    - 'new_indicator: jpy_synth_zscore added to indicators/macro/jpy_synth_zscore.py — JPY synthetic index Z-score direction
      filter (risk-off proxy) with auto-correlation pair detection'
    - 'registry_summary_updated: total_indicators=41, macro_count=2'
  version_9:
    date: '2026-05-12'
    changes:
    - 'governance_sync: 22 indicator modules added as stub entries — previously on disk but unregistered, blocking the registry
      from acting as an authoritative allowlist.'
    - 'enforcement_wired: indicators/INDICATOR_REGISTRY.yaml is now consulted by tools/semantic_validator.py at Stage-0.5.
      Every imported indicator module must (a) exist on disk and (b) appear here. Catches typo imports, deleted modules, orphan
      strategy dependencies.'
    - 'audit_finding: 14 NEWSBRK strategy folders reference indicators.macro.news_event_window + indicators.structure.pre_event_range
      which do not exist on disk. Surface only — no retirement decisions in this commit. See outputs/INDICATOR_GOVERNANCE_SYNC_2026_05_12.md.'
