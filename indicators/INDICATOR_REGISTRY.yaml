  # ---------------------------------------------------------------------------
  volatility_regime:
    module_path: indicators.volatility.volatility_regime
    function_name: volatility_regime
    classification: Regime
    input_requirements:
      - atr_series: pd.Series of ATR values
    parameters:
      window: int — rolling lookback for percentile
      low_thresh: float — percentile ceiling for low regime
      high_thresh: float — percentile floor for high regime
    default_parameters:
      window: 100
      low_thresh: 0.33
      high_thresh: 0.66
    output_type: DataFrame
    output_columns:
      - atr: float — raw ATR values passed through
      - percentile: float — rolling ATR percentile (0–1 internal scale)
      - regime: int — -1 (low), 0 (medium), 1 (high)
    output_scale: "percentile: 0-1 (internal); regime: -1/0/1"
    lookahead_safe: true
    rolling_window_used: Yes
    vectorized: Yes
    htf_compatible: Yes
    dependency_indicators:
      - atr
    typical_use_case: >
      Three-bucket volatility regime classifier used across all Index strategies.
      Engine maps regime codes to "low"/"normal"/"high" strings.
    notes: "Regime encoding: -1=low, 0=medium, 1=high."
    compatibility:
      suitable_for_intraday: Yes
      suitable_for_daily: Yes
      computational_cost: Medium
      risk_of_overfitting: Low


