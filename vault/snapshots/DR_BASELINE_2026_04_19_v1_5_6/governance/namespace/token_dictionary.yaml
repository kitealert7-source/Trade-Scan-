  - 1W
# SLOT-3 (stem token between FAMILY and TF) must be either:
#   - an asset_class token  (broad scope — the directive applies to many symbols)
#   - a symbol token        (narrow scope — single-pair directive)
#
# Historically slot-3 was parsed without a whitelist, allowing typos AND
# allowing layer violations (idea registered at class-scope but directive
# hardcoding a single symbol). The namespace gate now enforces membership
# in one of these two sets; an advisory is emitted when slot-3 is a symbol
# but the idea's instruments field is a class (class -> symbol drift).
asset_class:
  - FX
  - XAU
  - IDX
  - CRYPTO
  - BTC
  - ETH
symbol:
  - AUDJPY
  - AUDNZD
  - AUDUSD
  - BTCUSD
  - CADJPY
  - CHFJPY
  - ETHUSD
  - EURAUD
  - EURGBP
  - EURJPY
  - EURUSD
  - GBPAUD
  - GBPJPY
  - GBPNZD
  - GBPUSD
  - GER40
  - JPN225
  - NZDJPY
  - NZDUSD
  - UK100
  - USDCAD
  - USDCHF
  - USDJPY
  - XAUUSD
aliases:
  family: {}
  model:
    VOL_EXP: VOLEXP
    ATR_BRK: ATRBRK
  filter:
    ATR_FILTER: ATRFILT
  timeframe: {}
