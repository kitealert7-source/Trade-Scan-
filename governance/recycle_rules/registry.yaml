  - name: pine_ratio_zrev_v1_zstop
    version: 1
    description: >
      Hard z-stop overlay on the zero-cross exit variant (2026-06-11). Identical
      to pine_ratio_zrev_v1_zcross (entries, hedge lock, sizing, warmup, zcross
      exit) PLUS a hard stop:

        liquidate (next_open) the moment |z_active| >= z_stop (default 4.0), then
        LATCH -- no new entry is approved until a zero-cross (sign change of z)
        confirms the spread has mean-reverted. The next +/- z_entry cross after
        the reset opens a fresh cycle.

      Hypothesis: capping the adverse excursion (and refusing to re-enter the
      still-diverged spread until it crosses back through zero) reduces tail loss
      / improves risk-adjusted return vs the zcross champion. Default z_stop is
      finite (4.0); set it beyond the data's reach to recover exact champion
      behavior (the parity gate). Recycle event tag on a stop: LIQUIDATE_ZSTOP.

      Implementation: tools/recycle_rules/pine_ratio_zrev_v1_zstop.py.
      Subclasses PineRatioZRevRuleZCross; adds a |z|>=z_stop deferred (next_open)
      exit + a re-entry latch (SET on stop, RESET on zero-cross, gated in
      _maybe_approve), inert when |z| never reaches z_stop.
