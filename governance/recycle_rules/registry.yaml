# ════════════════════════════════════════════════════════════════════
# RECYCLE RULES REGISTRY
#
# Plan reference: H2_ENGINE_PROMOTION_PLAN.md Phase 1 (Section 8).
#
# Every basket directive's `basket.recycle_rule.name` MUST appear in this
# registry. namespace_gate / exec_preflight reject otherwise. Version is
# bumped whenever the rule's *behavior* (not just defaults) changes —
# bumping forces a new vault_id since the rule version is part of the
# basket strategy hash.
#
# Append-only by convention. Removing a rule version after it has been
# referenced by any vault is forbidden (would break audit replay).
# ════════════════════════════════════════════════════════════════════
version: 1
rules:
  - name: H2_v7_compression
    version: 1
    description: >
      DEPRECATED — misimplementation. This entry was originally intended to
      be the H2 strategy but the rule code implements a DIFFERENT mechanic
      (close-and-reopen ALL legs when total floating PnL >= harvest_usd,
      gated by compression_5d). The real H2 (Variant G + $2k harvest exit
      + compression>=10 gate on adds, 10/10 survival per
      tmp/eurjpy_recycle_v2_validation.py) is now registered as
      H2_recycle@1. This entry is preserved per the append-only invariant
      so any historical vault referencing it remains audit-replayable.
      DO NOT use this rule for new vaults.
    params:
      compression_5d_threshold:
        type: float
        default: 10.0
      stake_usd:
        type: float
        default: 1000.0
      harvest_usd:
        type: float
        default: 2000.0
    required_factors:
      - USD_SYNTH.compression_5d
    initial_consumer: tools/basket_runner.py  # Phase 2 deliverable
    deprecated: true
    superseded_by: H2_recycle@1

  - name: H2_recycle
    version: 1
    description: >
      H2 strategy (research-validated 10/10 survival, +62.8% mean across 10
      historical 2-year windows). EUR-long 0.02 + USD/JPY-short 0.01 starter,
      $1k stake, 1:1000 leverage. Variant G mechanic: when winner-leg floating
      PnL >= $10 AND loser-leg floating < 0, close winner (realize PnL into
      cash), ADD 0.01 lot to loser (weighted-avg new entry, lot grows).
      USD_SYNTH.compression_5d gate (default >=10.0) BLOCKS the add when the
      regime is non-trending. Safety caps: DD freeze at 10% of equity, margin
      freeze at 15% of equity. Harvest exit at $2k equity (close all, stop).
      Optional floor exit and time-stop available.
      Reference: tmp/eurjpy_recycle_v2_validation.py (CONFIGS H2 row).
    params:
      trigger_usd:
        type: float
        default: 10.0
      add_lot:
        type: float
        default: 0.01
      starting_equity:
        type: float
        default: 1000.0
      harvest_target_usd:
        type: float
        default: 2000.0
      equity_floor_usd:
        type: float
        default: null      # null disables the floor
      time_stop_days:
        type: int
        default: null      # null disables the time stop
      dd_freeze_frac:
        type: float
        default: 0.10
      margin_freeze_frac:
        type: float
        default: 0.15
      leverage:
        type: float
        default: 1000.0
      factor_column:
        type: str
        default: compression_5d
      factor_min:
        type: float
        default: 10.0
    required_factors:
      - USD_SYNTH.compression_5d
    initial_consumer: tools/basket_runner.py

  - name: H2_recycle
    version: 3
    description: >
      H2 with generalized cross-pair PnL math (Phase 1 Experiment, 2026-05-15).
      Identical to H2_recycle@2 (Variant G + harvest + freezes + max_leg_lot cap)
      except the per-leg PnL formula is generalized via a USD-conversion table
      covering the major-7 currencies (USD, EUR, GBP, AUD, NZD, JPY, CHF, CAD).
      Supports ANY 6-letter FX pair whose base+quote are in that set —
      including cross pairs without USD anchor (AUDJPY, GBPAUD, EURGBP, etc.).
      basket_data_loader.load_basket_leg_data() auto-loads the USD-anchored
      reference pairs needed for currency conversion and joins their closes
      as `usd_ref_<PAIR>_close` columns on each leg's DataFrame. The v3 rule
      reads those at each bar to compute USD-denominated PnL and margin.
      For USD-anchored pairs (EURUSD, USDJPY, etc.), the generalized math
      collapses to v1/v2's formulas — byte-identical behavior preserved.
      Implementation: tools/recycle_rules/h2_recycle_v3.py.
      Inherits all v2 params (incl. max_leg_lot). No new params.
    params:
      max_leg_lot:
        type: float
        default: null
      trigger_usd:
        type: float
        default: 10.0
      add_lot:
        type: float
        default: 0.01
      starting_equity:
        type: float
        default: 1000.0
      harvest_target_usd:
        type: float
        default: 2000.0
      equity_floor_usd:
        type: float
        default: null
      time_stop_days:
        type: int
        default: null
      dd_freeze_frac:
        type: float
        default: 0.10
      margin_freeze_frac:
        type: float
        default: 0.15
      leverage:
        type: float
        default: 1000.0
      factor_column:
        type: str
        default: compression_5d
      factor_min:
        type: float
        default: 10.0
    required_factors:
      - USD_SYNTH.compression_5d
    initial_consumer: tools/basket_runner.py

  - name: H2_recycle
    version: 5
    description: >
      H2 trend-follow pyramid (inverse-H2; H3 hypothesis 2026-05-17). The
      structural inversion of @1/@4: instead of recycling the winner and
      Martingale-ing the loser, we PYRAMID the winner (anti-Martingale)
      and hold the loser at its initial 0.01 lot as a tripwire + trend-
      distance sensor.

      Mechanic. On each bar:
        - Identify winner (highest floating) / loser (lowest floating).
        - If we're not yet in a pyramid cycle: first pyramid fires when
          bar_loser_float <= -pyramid_increment_usd (default -$10 ≈ 100
          pips of adverse on 0.01 lot). This locks _loser_sym +
          _pyramid_winner_sym for the cycle.
        - If we're in a pyramid cycle, the locked loser identity is used.
          Subsequent pyramids fire each time loser_float drops to
          (last_add_loser_level - pyramid_increment_usd). Add 0.01 to
          winner (weighted-avg entry update).
        - Exit (liquidation) fires when loser_float recovers
          exit_recovery_usd from its trough (regime reversal signal) OR
          basket floating drops below hard_floor_loss_usd (defensive
          floor — should rarely fire if recovery threshold tuned right).
        - On exit: realize ALL floating, call
          BasketRunner.soft_reset_basket (Phase-B primitive, commit
          62018ab), reset rule state. Next cycle starts fresh on next
          bar.

      Per-cycle loss is bounded at ~$10 plus brokerage (≈ 1.1% of $1k
      stake) by construction. Per-cycle upside is unbounded — winner
      pyramid accumulates during sustained trends.

      Regime gate. Typical V5 directive uses INVERTED operator (vs @1):
        factor_operator: '<='
        factor_min: 5
      → gate fires (blocks pyramid) when compression_5d > 5 (= chop).
      Effectively only pyramids in trending regimes. The factor_operator
      field is inherited from @1's schema; no new operator added.

      Implementation: tools/recycle_rules/h2_recycle_v5.py. Subclasses
      H2RecycleRule (@1) for params + helpers + parquet emission;
      overrides apply() entirely.

      Pipeline-only build (Path B, 2026-05-17): no basket_sim
      duplicate. The pipeline parquet IS the reference for H3 evidence.
      Hypothesis spec: backtest_directives/hypotheses/H3_TREND_FOLLOW_V1.yaml.
    params:
      # V5 new params:
      pyramid_increment_usd:
        type: float
        default: 10.0
      exit_recovery_usd:
        type: float
        default: 10.0
      hard_floor_loss_usd:
        type: float
        default: -10.0
      # Inherited from @1:
      trigger_usd:
        type: float
        default: 10.0
      add_lot:
        type: float
        default: 0.01
      starting_equity:
        type: float
        default: 1000.0
      harvest_target_usd:
        type: float
        default: 2000.0
      equity_floor_usd:
        type: float
        default: null
      time_stop_days:
        type: int
        default: null
      dd_freeze_frac:
        type: float
        default: 0.10
      margin_freeze_frac:
        type: float
        default: 0.15
      leverage:
        type: float
        default: 1000.0
      factor_column:
        type: str
        default: compression_5d
      factor_min:
        type: float
        default: 5.0           # H3 typical (operator may override)
      factor_operator:
        type: str
        default: "<="          # INVERTED vs @1 ('>=') — block pyramid in chop
    required_factors:
      - USD_SYNTH.compression_5d
    initial_consumer: tools/basket_runner.py
    requires_basket_runner_primitives:
      - soft_reset_basket    # Phase B; commit 62018ab

  - name: H2_recycle
    version: 4
    description: >
      H2 with bump-and-liquidate mechanic (Phase-2 multi-window champion,
      2026-05-16). Identical to H2_recycle@1 (Variant G + harvest + freezes +
      regime gate) until N=`switch_n` consecutive same-loser recycle adds
      have fired. At that point the rule executes a ONE-TIME bump of
      `(switch_n + 1) * add_lot` (default 0.06) lot to the current winner
      at the current bar's close, with weighted-avg entry-price update.
      Bump enters Mode 2 (HOLD): no further trades; tracks winner-leg
      floating PnL peak each bar. When the current winner floating retraces
      `retrace_pct` (default 0.30) from its Mode-2 peak, the rule:
        1. realized_total += floating_total (rule-side accounting)
        2. BasketRunner.soft_reset_basket(at_index, at_ts, at_prices)
           closes positions + reopens fresh at initial_lot at current prices
        3. Mode resets to RECYCLE; counters cleared
        4. LIQUIDATE_RESET event logged in recycle_events
      Basket continues — a fresh sub-basket starts at the liquidation bar.
      Multiple cycles per window are expected (empirical 10-window matrix:
      4-7 typical, max 7).

      Empirical results (research/FX_BASKET_RECYCLE_RESEARCH.md §5.4b,
      10-window matrix 2016-09 to 2026-05, R1:1 Gate=5):
        - B1 (EUR+JPY): 10/10 survival, mean +25.85%, max DD 60% (vs
          current @1's 120%), mean DD 35% (vs 58%).
        - B2 (AUD+CAD): 10/10 survival (vs current @1's 9/10), median net
          +1.58% (vs -7.15%), B2 COVID-era blow-up prevented.

      Implementation: tools/recycle_rules/h2_recycle_v4.py (subclasses
      H2RecycleRule). Consumes basket_runner.soft_reset_basket primitive.
      Pipeline-routed (preferred over the basket_sim-only scratch
      implementation per the "prefer pipeline" feedback rule).
    params:
      # New v4 params:
      switch_n:
        type: int
        default: 5
      retrace_pct:
        type: float
        default: 0.30
      # All v1 params inherited unchanged:
      trigger_usd:
        type: float
        default: 10.0
      add_lot:
        type: float
        default: 0.01
      starting_equity:
        type: float
        default: 1000.0
      harvest_target_usd:
        type: float
        default: 2000.0
      equity_floor_usd:
        type: float
        default: null
      time_stop_days:
        type: int
        default: null
      dd_freeze_frac:
        type: float
        default: 0.10
      margin_freeze_frac:
        type: float
        default: 0.15
      leverage:
        type: float
        default: 1000.0
      factor_column:
        type: str
        default: compression_5d
      factor_min:
        type: float
        default: 5.0      # Phase-2 default (Gate=5 is the chop-vs-trend cliff)
      factor_operator:
        type: str
        default: ">="
    required_factors:
      - USD_SYNTH.compression_5d
    initial_consumer: tools/basket_runner.py
    requires_basket_runner_primitives:
      - soft_reset_basket    # Phase B; commit 62018ab

  - name: H3_spread
    version: 2
    description: >
      H3_spread@1 + bounded-exposure + symmetric harvest scale-out
      (structural probe, 2026-05-19). Identical to @1 P03 in every
      respect EXCEPT the pyramid mechanic now has a two-phase lifecycle:

      Phase 1 (accumulation): pyramid threshold crossings ADD
      pyramid_add_lot to both legs, weighted-avg entry update — same as
      @1 — until per-leg lot reaches max_exposure_multiple * initial_lot
      (default 3.0×, i.e. 0.10 → 0.30).

      Phase 2 (harvest): once cap reached, subsequent threshold crossings
      SCALE OUT both legs by pyramid_add_lot each, realizing the
      proportional share of leg floating as cycle PnL (entry-price
      unchanged on scale-out). Continues at each monotonically-increasing
      threshold until any leg's lot would drop to <= 0, at which point
      the cycle terminates with LIQUIDATE_HARVEST_COMPLETE and the leg
      strategy resumes watching for the next cross signal.

      All other exits (TIME_STOP, ADVERSE_STOP, REVERSE_CROSS, optional
      TRAIL_STOP) preserve @1 priority + thresholds. Threshold spacing
      generalized from @1's [0.15, 0.30] list to a single
      `pyramid_threshold_step_pct` (default 0.15) so harvest can fire
      indefinitely above the cap.

      Hypothesis: bounded exposure growth + systematic harvest preserves
      convex runners (Phase 2 banks profits at every level above the cap
      instead of waiting for reverse-cross) while reducing late-cycle
      adverse-stop dollar losses (smaller residual position by the time
      -adverse_stop_pct hits).

      Implementation: tools/recycle_rules/h3_spread_v2.py. Subclasses
      H3SpreadV1Rule; overrides apply() entirely; adds _commit_harvest().
    params:
      # New V2 params:
      max_exposure_multiple:
        type: float
        default: 3.0
      pyramid_threshold_step_pct:
        type: float
        default: 0.15
      # Delayed-harvest extension (2026-05-19). When > 0, cycle enters a
      # HOLD phase on cap-reach: subsequent threshold crossings are consumed
      # (hysteresis preserved) without changing lot, until
      # harvest_start_after_extra_pyramids have passed. Then HARVEST begins
      # as before. Default 0 = original @2 immediate-harvest behavior
      # (byte-equivalent).
      # Legacy alias `harvest_delay_levels` (deprecated 2026-05-19): the
      # dispatcher still accepts the old name as a fallback for S02/S03
      # directive replay; new directives should use the canonical name.
      harvest_start_after_extra_pyramids:
        type: int
        default: 0
      # Keep-core extension (2026-05-19). When True, the harvest scale-out
      # chain stops at the initial lot per leg rather than continuing to
      # zero. After reaching the floor, the cycle enters a CORE_HOLD phase
      # (silent threshold consumption, lot persists) and exits only via
      # reverse-cross / adverse-stop / time-stop. Designed to separate
      # leverage growth (controlled by cap + harvest) from trend
      # participation (preserved by persistent core). Default False =
      # scale-to-zero (terminate at LIQUIDATE_HARVEST_COMPLETE).
      harvest_keeps_core:
        type: bool
        default: false
      # Bidirectional extension (2026-05-19). When True, the cycle's
      # direction is set per-cycle from the cross-side at basket-open
      # (UP-cross -> +1 / LONG spread, DOWN-cross -> -1 / SHORT spread)
      # rather than the static entry_direction param. Reverse-cross exit
      # check uses the cycle's own direction. Requires the leg strategy
      # to also run in bidirectional mode (cross_watch_direction=0) —
      # tools.run_pipeline auto-configures this when bidirectional=true.
      # Default false = uni-directional behavior driven by entry_direction
      # (byte-equivalent to S01-S05 directives).
      bidirectional:
        type: bool
        default: false
      # All V1 params inherited:
      pyramid_add_lot:
        type: float
        default: 0.05
      adverse_stop_pct:
        type: float
        default: 0.0020
      time_stop_bars:
        type: int
        default: 288
      reverse_cross_column:
        type: str
        default: "cross_side"
      entry_direction:
        type: int
        default: 1
      initial_notional_usd:
        type: float
        default: 1000.0
      trail_arm_floating_usd:
        type: float
        default: 0.0
      trail_retrace_pct:
        type: float
        default: 0.0
    required_factors:
      - spread_sma_cross.cross_side
      - spread_sma_cross.cross_event
    initial_consumer: tools/basket_runner.py
    requires_basket_runner_primitives:
      - soft_reset_basket

  - name: H3_spread
    version: 1
    description: >
      LONG-SHORT pair-spread basket rule (H3 family). Distinct from
      H2_recycle@1-5 (which manage LONG-LONG / USD-cancelling baskets
      via leg-asymmetric loser-driven mechanics). H3_spread manages a
      USD-directional spread where one leg is long and the other short,
      so basket P&L isolates the USD-direction component.

      Hypothesis (2026-05-18 session): after a z-normalized SMA
      crossover between two USD-anchored pairs (e.g. EURUSD/USDJPY), the
      USD-direction spread tends to drift in the current macro regime
      direction. Capture by:
        - opening on cross signal (via SpreadCrossLegStrategy on each leg)
        - holding while regime persists
        - pyramiding into the winners (anti-Martingale)
        - exiting on reverse cross / adverse stop / time stop

      Mechanic per bar (priority order):
        1. TIME_STOP: liquidate if elapsed bars >= time_stop_bars
        2. ADVERSE_STOP: liquidate if floating <= -adverse_stop_pct * notional
        3. REVERSE_CROSS: liquidate if leg.df[cross_side] != entry_direction
        4. PYRAMID: if floating >= next level threshold, add pyramid_add_lot
           to BOTH legs (preserving direction)

      v1 limitations:
        - Adverse stop uses bar-close P&L (not intra-bar OHLC). v2 plan:
          use engine v1_5_8 unrealized_r_intrabar.
        - Pyramid adds uniformly to both legs (preserves spread structure).
          Asymmetric variant (only better leg) deferred to v2.

      Implementation: tools/recycle_rules/h3_spread_v1.py. Inherits from
      H2RecycleRule for parquet+events list machinery; overrides apply()
      entirely. Uses V3 cross-pair helpers (_build_ref_closes, _leg_pnl_usd).
      Consumed by tools.basket_runner via BasketRule protocol.
    params:
      pyramid_level_pcts:
        type: list[float]
        default: [0.15, 0.30]
      pyramid_add_lot:
        type: float
        default: 0.05
      adverse_stop_pct:
        type: float
        default: 0.0020
      time_stop_bars:
        type: int
        default: 288
      reverse_cross_column:
        type: str
        default: "cross_side"
      entry_direction:
        type: int
        default: 1
      initial_notional_usd:
        type: float
        default: 1000.0
    required_factors:
      - spread_sma_cross.cross_side
      - spread_sma_cross.cross_event
    initial_consumer: tools/basket_runner.py
    requires_basket_runner_primitives:
      - soft_reset_basket    # Phase B; commit 62018ab

  - name: H2_recycle
    version: 2
    description: >
      H2 with loser-leg lot cap (Phase 1 Experiment A, 2026-05-15).
      Identical to H2_recycle@1 except at the commit step: when a Variant G
      recycle event would grow the loser's lot above `max_leg_lot`, the
      winner is still realized (cash banked) but the loser's lot is NOT
      grown — it stays at its current lot, entry price unchanged. Targets
      the intraday loser-leg accumulation pathology identified via the
      2026-05-15 regime-feature probe (compression IS the right gate, but
      lot accumulation makes the strategy pip-sensitive regardless).
      Setting `max_leg_lot = null` makes v2 byte-equivalent to v1.
      New telemetry: `_n_cap_skipped` counter; per-event `cap_skipped` bool.
      Implementation: tools/recycle_rules/h2_recycle_v2.py.
    params:
      # All v1 params inherited unchanged. Only new param:
      max_leg_lot:
        type: float
        default: null      # null disables the cap (== v1 behavior)
      # v1 params repeated here for self-contained registry record:
      trigger_usd:
        type: float
        default: 10.0
      add_lot:
        type: float
        default: 0.01
      starting_equity:
        type: float
        default: 1000.0
      harvest_target_usd:
        type: float
        default: 2000.0
      equity_floor_usd:
        type: float
        default: null
      time_stop_days:
        type: int
        default: null
      dd_freeze_frac:
        type: float
        default: 0.10
      margin_freeze_frac:
        type: float
        default: 0.15
      leverage:
        type: float
        default: 1000.0
      factor_column:
        type: str
        default: compression_5d
      factor_min:
        type: float
        default: 10.0
    required_factors:
      - USD_SYNTH.compression_5d
    initial_consumer: tools/basket_runner.py
