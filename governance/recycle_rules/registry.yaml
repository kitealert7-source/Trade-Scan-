  - name: cointegration_meanrev_v1_2
    version: 1
    description: >
      COINTREV v1.2 trigger-driven β-weighted spread strategy (2026-05-24).
      Replaces the retired equal-lot COINTREV v1 (commit 605317c, 2026-05-21).
      Reads the cointegration_triggers ledger (SQLite, populated by the
      screener) via basket_data_loader auto-join (opt-in via
      basket.cointegration_join.lookback_days on the directive — typically
      252 or 504). Each trigger row carries the β at trigger time; the rule
      uses tools.cointegration_excel._compute_neutral_basket(sym_a, sym_b,
      β) to size both legs to a β-neutral minimum-tradeable basket on
      OctaFX broker specs.

      Two-bar leg ↔ rule protocol (avoids open-then-mutate lot adjustment):
        Bar N    : CointTriggerLegStrategy detects coint_trigger=True and
                   writes a proposal (pending_trigger_ts, proposed_direction,
                   pending_trigger_as_of) into shared CointTriggerArmedState.
                   Returns None (no fire).
        Bar N    : This rule's apply() inspects the proposal, enforces
                   min_gap_days_between_triggers + no-open-position policy,
                   reads coint_beta_at_trigger, computes β-sized lots,
                   MUTATES leg.lot, sets approved_fire_ts to next aligned
                   bar (STRICTLY > pending_trigger_ts — asserted).
        Bar N+1  : Leg returns signal; engine queues open at next_bar_open
                   (Bar N+2) with already-correct β-sized lot.
        Bar N+2  : Both legs in_pos → BASKET_OPEN event recorded;
                   _last_entry_as_of committed for next cycle's min-gap;
                   shared state cleared.

      Exits per bar (priority order — BASE RUN, no hard z-stop):
        1. MEAN_REVERSION       : abs(coint_current_zscore) <= exit_z
        2. REGIME_DEGRADATION   : coint_regime in regime_exit_states
                                  (default ['breaking', 'broken'] — LOCKED
                                  per DESIGN_DOC.md §4. Changing this rule
                                  requires a separate v1.2-strict baseline,
                                  NOT a v1.2.x knob — would invalidate
                                  apples-to-apples variant comparison).
        3. TIME_STOP            : elapsed bars in position >= time_stop_bars

      Restores leg.lot to default_initial_lot on liquidation; next cycle's
      β-sized lots are computed at the next approval bar.

      Future v1.2.x extensions (NOT in base run; one knob per variant):
        v1.2.1: hard_stop_z_above_entry — z-based hard stop
        v1.2.2: enable_pyramid          — pyramid on new trigger
        v1.2.3: harvest_scale_out       — partial close at intermediate z
        v1.2.4: preemptive_pvalue_exit_threshold — pre-empt regime classifier

      Implementation: tools/recycle_rules/cointegration_meanrev_v1_2.py.
      Inherits H2RecycleRule for parquet/events machinery (same pattern as
      H3_spread); inherited harvest/freeze params are unused.
    params:
      min_gap_days_between_triggers:
        type: int
        default: 5
      exit_z:
        type: float
        default: 1.0
      time_stop_bars:
        type: int
        default: 60
      regime_exit_states:
        type: list[str]
        default: ["breaking", "broken"]
      initial_notional_usd:
        type: float
        default: 1000.0
      default_initial_lot:
        type: float
        default: 0.01
      trigger_column:
        type: str
        default: coint_trigger
      regime_column:
        type: str
        default: coint_regime
      zscore_column:
        type: str
        default: coint_current_zscore
      beta_column:
        type: str
        default: coint_beta_at_trigger
      direction_column:
        type: str
        default: coint_direction
    required_factors:
      - cointegration.coint_trigger
      - cointegration.coint_regime
      - cointegration.coint_current_zscore
      - cointegration.coint_beta_at_trigger
      - cointegration.coint_direction
    initial_consumer: tools/basket_runner.py

  - name: pine_ratio_zrev_v1
    version: 1
    description: >
      Pine port of ratio-hedged z_r reversal (2026-05-24). Preserved follow-on
      arc #2 from COINTREV v1.2 retirement (see
      outputs/cointegration_screener_v1/v1_2_backtest/REPORT_pilot_2026-05-24.md
      addendum 5). Material delta vs retired v1.2:
        (1) Hedge = SMA(A/B, N), not Pearson β from _compute_neutral_basket.
        (2) Signal = per-bar z_r computed in rule from close prices via
            indicators.stats.ratio_hedged_spread_zscore — does NOT read the
            cointegration_triggers ledger.
        (3) Exit logic = always-in-market reversal at |z_r| >= z_entry (Centered
            mode subtracts z_r's own rolling mean before threshold check); does
            NOT use three-exit (mean-rev / regime / time-stop).
        (4) Hedge ratio LOCKED at entry per CLAUDE.md invariant 4
            (snapshot-immutable).

      Two-bar leg ↔ rule protocol same as cointegration_meanrev_v1_2 (proposal
      bar N → approval bar N → leg fires bar N+1 → engine opens at next_bar_open).
      Z_r series computed once on first apply() call and attached to BOTH legs'
      DataFrames as `pine_zrev_signal` (+1/-1/0 cross events), `pine_zrev_z`,
      `pine_zrev_r_bar`, and (Centered mode only) `pine_zrev_z_centered` +
      `pine_zrev_mean_zr`.

      Reversal mechanic: when basket is OPEN in direction X and a z_r cross
      in the OPPOSITE direction fires, the rule LIQUIDATEs the current basket
      AND sets a fresh proposal (with reversed direction) in the SAME apply()
      pass. No idle gap between cycles (always_in_market=true).

      Implementation: tools/recycle_rules/pine_ratio_zrev_v1.py. Inherits
      H2RecycleRule for parquet/events machinery (same pattern as
      cointegration_meanrev_v1_2 and H3_spread). Reuses v1.2's
      _leg_pnl_usd_universal / _leg_margin_usd_universal helpers for FX-IDX
      cross-asset PnL accounting. Sizing is default_initial_lot for both legs
      in v1 (vol-equivalent sizing deferred to v1.1+ if pilot shows edge).
    params:
      n_window:
        type: int
        default: 100
      n_meta:
        type: int
        default: 100
      z_entry:
        type: float
        default: 2.0
      entry_mode:
        type: str
        default: centered
      hedge_lock_at_entry:
        type: bool
        default: true
      always_in_market:
        type: bool
        default: true
      initial_notional_usd:
        type: float
        default: 1000.0
      default_initial_lot:
        type: float
        default: 0.01
      target_notional_per_leg_usd:
        type: float
        default: 10000.0
    required_factors: []
    initial_consumer: tools/basket_runner.py

  - name: H3_spread
    version: 3
    description: >
      H3_spread@2 + extreme-z take-profit exit + ARMED-for-reentry phase
      (multi-leg trend capture, 2026-05-22). Inherits all @2 mechanics
      (harvest, keep_core, bidirectional, macro filter wiring) and adds
      two composable mechanics, both default off (config'd to be byte-
      equivalent to @2 when params unset).

      Mechanic A -- EXTREME-Z EXIT
        When `cycle_dir * diff > extreme_z_threshold`, the cycle liquidates
        via a new exit reason `LIQUIDATE_EXTREME_Z`. Priority slot:
        TIME > ADVERSE > EXTREME_Z > TRAIL > REVERSE > HARVEST. Side-aware:
        wrong-direction extremes (cycle_dir * diff << 0) are NOT triggers
        -- those are losing-leg scenarios for ADVERSE_STOP. Reads the
        smoothed `diff` column from each leg's df (joined by
        basket_data_loader, commit faecf6b).

      Mechanic B -- ARMED-for-reentry
        After an EXTREME_Z exit (and ONLY that exit), if
        `reentry_z_threshold` is set, transitions to ARMED_FOR_REENTRY
        instead of fully terminating. While armed, watches each bar for:
          - re-entry trigger: 0 < cycle_dir * diff < reentry_z_threshold
            AND cross_side aligned with cycle_dir
            AND htf_direction aligned (if reentry_macro_check=true)
            -> reset leg state, fresh cycle, _reentries_this_regime++
          - abort: cross_side flips (CROSS_FLIPPED) OR htf_direction
            flips (MACRO_FLIPPED) OR per-regime cap reached
            (MAX_REENTRIES_REACHED) -> clear armed flag, await new
            cross_event
        cycle_direction is preserved across the EXTREME_Z -> ARMED ->
        REENTRY gap. Pyramid stack resets to 0 on re-entry (fresh cycle).

      Hypothesis: H3_spread@2 captures only ONE leg per cross_event before
      sitting in CORE_HOLD waiting for the macro turn. Within a macro
      regime that lasts months, the spread oscillates around its long-run
      mean producing multiple distinct legs. Profit-take at peak +
      re-engage on normalization captures each leg distinctly.

      Implementation: tools/recycle_rules/h3_spread_v3.py. Subclasses
      H3SpreadV2Rule. Reuses the @2 _check_extreme_z_exit_hook (no-op
      in @2, real check in @3) for the exit priority insertion.

      Default-off byte-equivalence: with extreme_z_threshold=None and
      reentry_z_threshold=None, H3SpreadV3Rule produces byte-identical
      recycle_events to H3SpreadV2Rule (enforced by
      test_v3_byte_equiv_to_v2_* and
      test_v3_extreme_z_with_threshold_byte_equiv_to_v2_when_diff_subthreshold).
    params:
      # New V3 params (all default off):
      extreme_z_threshold:
        type: float
        default: null     # null = mechanic A disabled
      reentry_z_threshold:
        type: float
        default: null     # null = mechanic B disabled; requires extreme_z set
      reentry_macro_check:
        type: bool
        default: true     # require htf_direction still aligned on re-entry
      reentry_cross_check:
        type: bool
        default: true     # require cross_side still aligned on re-entry
      reentry_max_per_regime:
        type: int
        default: 3        # safety cap on re-entries between cross_events
      # All V2 params inherited:
      max_exposure_multiple:
        type: float
        default: 3.0
      pyramid_threshold_step_pct:
        type: float
        default: 0.15
      harvest_start_after_extra_pyramids:
        type: int
        default: 0
      harvest_keeps_core:
        type: bool
        default: false
      bidirectional:
        type: bool
        default: false
      # V1 params inherited:
      pyramid_add_lot:
        type: float
        default: 0.05
      adverse_stop_pct:
        type: float
        default: 0.0020
      time_stop_bars:
        type: int
        default: 288
      reverse_cross_column:
        type: str
        default: "cross_side"
      entry_direction:
        type: int
        default: 1
      initial_notional_usd:
        type: float
        default: 1000.0
      trail_arm_floating_usd:
        type: float
        default: 0.0
      trail_retrace_pct:
        type: float
        default: 0.0
    required_factors:
      - spread_sma_cross.cross_side
      - spread_sma_cross.cross_event
      - spread_sma_cross.diff
    initial_consumer: tools/basket_runner.py
    requires_basket_runner_primitives:
      - soft_reset_basket

  - name: pine_ratio_zrev_v1_zband
    version: 1
    description: >
      A/B test variant of pine_ratio_zrev_v1 (2026-06-01). Sibling to
      pine_ratio_zrev_v1_zcross. Identical entries, hedge lock, sizing, warmup
      contract. Only exit logic differs:

        Baseline (pine_ratio_zrev_v1): liquidate on opposite-direction cross
        of |z_active| >= z_entry (always-in-market reversal; exit IS the
        next entry signal).

        Variant: liquidate on first bar where |z_active| <= z_exit (default
        1.0). The spread has reverted to the equilibrium band. Strategy goes
        FLAT after exit; next +/- z_entry cross opens a fresh cycle. No
        same-bar repropose.

      Hypothesis: bank partial mean-reversion at the equilibrium band rather
      than chase the full extreme-to-extreme swing — caps both per-cycle
      drawdown and per-cycle upside, leaving Ret/DD trade-off as the
      empirical question.

      Recycle event tag emitted on exit: LIQUIDATE_BAND_REVERT (distinct from
      baseline's REVERSAL and pine_ratio_zrev_v1_zcross's EQUILIBRIUM).
      always_in_market param inherited but functionally ignored under the new
      exit semantic.

      Implementation: tools/recycle_rules/pine_ratio_zrev_v1_zband.py.
      Subclasses PineRatioZRevRule; overrides _attach_z_r (attaches
      pine_zrev_zband_exit boolean column = |z| <= z_exit) and apply
      (replaces REVERSAL check with BAND_EXIT check, plus `not band_exit`
      guard on FLAT-state propose path). z_exit must be > 0 AND < z_entry.
    params:
      n_window:
        type: int
        default: 100
      n_meta:
        type: int
        default: 100
      z_entry:
        type: float
        default: 2.0
      z_exit:
        type: float
        default: 1.0
      entry_mode:
        type: str
        default: "centered"
      hedge_lock_at_entry:
        type: bool
        default: true
      always_in_market:
        type: bool
        default: true
      initial_notional_usd:
        type: float
        default: 1000.0
      target_notional_per_leg_usd:
        type: float
        default: 10000.0
      default_initial_lot:
        type: float
        default: 0.01
    required_factors: []
    initial_consumer: tools/basket_runner.py

  - name: pine_ratio_zrev_v1_zopp
    version: 1
    description: >
      Opposite-band (overshoot) exit variant of pine_ratio_zrev_v1
      (2026-06-04, operator-directed). TRUE exit-only change: entries remain
      exclusively at |z_active| >= z_entry (+/-2); sizing (incl. GP granular),
      hedge lock, recycle, warmup all inherited unchanged.

        Baseline (pine_ratio_zrev_v1): liquidate+reverse on opposite-direction
        cross of |z_active| >= z_entry (always-in-market; reverse at +/-2).

        Variant: liquidate FLAT when z crosses to the OPPOSITE side beyond
        +/- z_exit (default 1.0) -- entered at -2 exits at +1; entered at +2
        exits at -1. A LATE exit: rides the full reversion PLUS the overshoot
        to the opposite +/- z_exit, then goes FLAT. Next +/- z_entry cross
        opens a fresh cycle. No same-bar repropose.

      Hypothesis: holding through zero to the opposite +/- z_exit captures more
      of the swing than the same-side band exit (zband) while still exiting
      before the full extreme (baseline); Ret/DD vs tail is the empirical
      question.

      Recycle event tag emitted on exit: LIQUIDATE_OPP_REVERT (distinct from
      baseline REVERSAL, zcross EQUILIBRIUM, zband BAND_REVERT).
      always_in_market inherited but functionally ignored.

      Implementation: tools/recycle_rules/pine_ratio_zrev_v1_zopp.py.
      Subclasses PineRatioZRevRule; apply() captures entry z-sign at
      BASKET_OPEN and liquidates FLAT when z_active * (-entry_z_sign) >= z_exit
      (min-hold-1-bar guard). z_exit must be > 0 AND < z_entry.
    params:
      n_window:
        type: int
        default: 100
      n_meta:
        type: int
        default: 100
      z_entry:
        type: float
        default: 2.0
      z_exit:
        type: float
        default: 1.0
      entry_mode:
        type: str
        default: "centered"
      hedge_lock_at_entry:
        type: bool
        default: true
      always_in_market:
        type: bool
        default: true
      initial_notional_usd:
        type: float
        default: 1000.0
      target_notional_per_leg_usd:
        type: float
        default: 10000.0
      default_initial_lot:
        type: float
        default: 0.01
    required_factors: []
    initial_consumer: tools/basket_runner.py

