# Directive Supersession Map — lineage preservation artifact.
#
# Purpose: durable mapping of superseded directive IDs to their canonical
# successors. Consumed by report tooling, audit queries, and cross-time
# comparison logic so that references to old IDs can resolve to current
# canonical IDs without mutating the old artifacts.
#
# Invariants:
#   - Append-only. Never edit or remove a mapping once published.
#   - Superseded directives retain their original names on disk (in
#     completed/, runs/, strategies/, Master Filter rows with is_current=0).
#   - This file is the single source of truth for (old -> new) lineage.
#
# Schema:
#   <old_directive_id>:
#     superseded_by: <new_directive_id>
#     reason: <short human-readable cause>
#     superseded_at_utc: <ISO-8601>
#     path_b_batch: <batch identifier grouping the migration>

schema_version: "1.0"

supersessions:

