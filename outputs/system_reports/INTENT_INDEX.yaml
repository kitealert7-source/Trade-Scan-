# INTENT_INDEX.yaml
# ------------------------------------------------------------------
# Maps natural-language user intents to skills/workflows that must be
# invoked. Consumed by .claude/hooks/intent_injector.py on every
# UserPromptSubmit event.
#
# Fields per intent:
#   id             : unique slug (used in telemetry log)
#   priority       : int, higher wins on overlap
#   enforcement    : "hard" | "soft"
#                    hard -> MANDATORY blocking directive (must_skill required)
#                    soft -> advisory skill hint OR memory hint
#   must_skill     : slug under .claude/skills/ (resolves to .claude/skills/<slug>/SKILL.md)
#                    Required for hard enforcement.
#   memory_hint    : optional memory entry slug. Soft enforcement only.
#                    Emits a "[Memory hint] Re-read [[<slug>]]" banner.
#                    Used for advisories tied to a specific feedback entry
#                    rather than a workflow skill. Either must_skill or
#                    memory_hint MUST be declared; memory_hint wins on emission
#                    if both are present.
#   threshold      : optional int (default 3) for fuzzy score
#   regex_patterns : authoritative; any hit -> score 100
#   semantic_tags  : fuzzy fallback, each has {tag, weight}
#                    exact word-boundary hit -> weight * 2
#                    substring-only hit      -> weight * 1
#                    proximity bonus (+3) if two distinct exact hits
#                    lie within <=3 tokens of each other
#
# DOCTRINE — NO NAKED FUZZY INTENTS:
#   Every intent (hard or soft) MUST declare at least one of:
#     requires_subject: true   — gate fuzzy on strong subject evidence
#                                (strategy_id / PF_id / vault_id) and
#                                suppress on infra-action verbs.
#     suppress_on_infra: true  — suppress on infra-action verbs only
#                                (for intents without a natural subject).
#     frozen_path_only: true   — gate on actual changed-file scope.
#   Without one of these, fuzzy + tag substring matches will leak
#   false positives onto meta-tooling prompts that share vocabulary
#   with the workflow (e.g. "delete the /promote tool" firing
#   /promote). The schema test in tests/test_intent_injector_promote_
#   subject.py::TestNakedFuzzyForbidden enforces this at CI time.
#
# Cap: MAX_INTENTS = 25. Adding a 26th requires merging or deleting
# an existing entry. Index growth past that point kills maintainability.
# ------------------------------------------------------------------

intents:

  # ---------- HARD ENFORCEMENT ----------
  - id: engine_change
    priority: 100
    enforcement: hard
    must_skill: update-vault
    expected_file_category: engine
    # Threshold raised from default 3 to 6 after a misfire on 2026-04-24:
    # an indicator-only commit matched the bare tag "engine" (weight 2,
    # word-boundary score 4) in a sentence that explicitly said NOT to
    # touch engine work. Regex patterns continue to hard-fire exact
    # engine phrases; fuzzy fallback now requires either a
    # high-specificity solo hit (execution_loop / engine_registry /
    # v1.5* / v1.6*, each scoring 6) or "engine" co-occurring with a
    # second engine-scope tag (vault, canonical, frozen, manifest).
    threshold: 6
    # S1 fix (2026-05-04): regex/fuzzy matches alone are no longer
    # sufficient — the change set must actually touch a frozen-scope
    # path (engine_dev/<version>/..., vault/engines/..., engine_manifest
    # .json, contract.json). Conversational mentions of "engine" in
    # session-close discussions, infra audits, or path-resolution work
    # produced 12+ violations in 24h before this gate was added.
    # Untracked files are excluded from the change set (see
    # intent_injector._get_changed_files); active edits still trigger.
    frozen_path_only: true
    reason: "Engine build/modify requires vault push + manifest refresh. Engine v1.5.6 shipped unvaulted for days -- root cause: no enforced workflow."
    regex_patterns:
      - "(?i)\\b(new|build|bump|promote|release|freeze|finalize|ship)\\s+(the\\s+)?engine\\b"
      - "(?i)\\bengine\\s+v?\\d+[._]\\d+[._]\\d+\\b"
      - "(?i)\\b(push|vault|snapshot|publish)\\s+(the\\s+|this\\s+)?engine\\b"
      - "(?i)\\bengine_dev/"
      - "(?i)\\bENGINE_VERSION\\b"
    semantic_tags:
      - {tag: "engine", weight: 2}
      - {tag: "vault", weight: 2}
      - {tag: "v1.5", weight: 3}
      - {tag: "v1.6", weight: 3}
      - {tag: "canonical", weight: 2}
      - {tag: "frozen", weight: 1}
      - {tag: "manifest", weight: 1}
      - {tag: "execution_loop", weight: 3}
      - {tag: "engine_registry", weight: 3}

  - id: promote_strategy
    priority: 90
    enforcement: hard
    must_skill: promote
    expected_file_category: strategy
    threshold: 8
    requires_subject: true
    reason: "Promotion touches append-only ledgers, vault, FSM state. Ad-hoc promotion has left orphan strategies and stale PORTFOLIO_COMPLETE markers."
    # Hard-fire requires BOTH a promotion verb AND strategy/subject evidence:
    #   - Strong evidence: an explicit identifier (FOO_V<n>_P<n>, PF_<hex>,
    #     DRY_RUN_<date>) anywhere in the prompt.
    #   - Idiomatic evidence: a phrasal pattern like "add X to portfolio" or
    #     "deploy X strategy" — gated post-score by infra-action suppression
    #     (delete/refactor/migrate/etc. words elsewhere in the prompt block
    #     the injection unless strong evidence is also present).
    # Pure fuzzy matches without strong subject evidence are suppressed by
    # the `requires_subject: true` post-filter in intent_injector.py.
    regex_patterns:
      # Strong evidence: explicit strategy ID + promotion verb co-occurrence.
      - "(?is)(?=.*\\b[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b)(?=.*\\b(promote|promoting|promotion|deployable|portfolio[_ ]complete|go[- ]?live)\\b)"
      # Strong evidence: explicit ID right next to a verb.
      - "(?i)\\bpromote\\s+[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b"
      - "(?i)\\b(move|send|advance)\\s+[A-Z0-9][A-Z0-9_]*\\s+to\\s+live\\b"
      # Idiomatic evidence: action + portfolio/live target (subject to
      # infra-action suppression — e.g., "delete X to portfolio" suppresses).
      - "(?i)\\b(promote|deploy|push)\\s+\\S+(\\s+\\S+){0,5}\\s+to\\s+(live|portfolio)\\b"
      - "(?i)\\b(add|put)\\s+\\S+(\\s+\\S+){0,3}\\s+to\\s+portfolio\\b"
      - "(?i)\\b(promote|deploy)\\s+\\S+(\\s+\\S+){0,2}\\s+strategy\\b"
    semantic_tags:
      - {tag: "promote", weight: 3}
      - {tag: "deployable", weight: 2}
      - {tag: "portfolio_complete", weight: 3}
      - {tag: "go_live", weight: 3}

  # ---------- SOFT REMINDERS ----------
  - id: run_directive
    priority: 50
    enforcement: soft
    must_skill: execute-directives
    requires_subject: true
    reason: "Pipeline execution has a mandatory pre-directive gate and sequential-only rule."
    # Pre-fix, fuzzy fired on any prompt mentioning "directive" or "stage1"
    # at word boundary, including meta-tooling prompts about the directive
    # parser. requires_subject gates the fuzzy path on a strategy/directive
    # ID; explicit regex patterns (run_pipeline.py / "run the directive" /
    # "execute directive") still fire without subject evidence.
    regex_patterns:
      - "(?i)\\brun_pipeline\\.py\\b"
      - "(?i)\\brun\\s+(the\\s+)?directive\\b"
      - "(?i)\\b(execute|kick\\s*off|start)\\s+(directive|backtest)\\b"
      - "(?i)\\b(run|execute)\\s+[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b"
    semantic_tags:
      - {tag: "directive", weight: 2}
      - {tag: "pipeline", weight: 1}
      - {tag: "backtest", weight: 1}
      - {tag: "stage1", weight: 2}
      - {tag: "stage3", weight: 2}

  - id: rerun_backtest
    priority: 55
    enforcement: soft
    must_skill: rerun-backtest
    requires_subject: true
    reason: "Re-runs need the audited Idea-Gate override + __E### variant rotation; the prior run is auto-superseded at Stage-3 (Phase-0) for declared reruns, or via finalize for BUG_FIX/--quarantine -- not manual ledger cleanup/reset_directive."
    # Pre-fix, the tag `rerun` (weight 3) substring-matched on any prompt
    # mentioning the intent name itself ("rerun_backtest") or unrelated
    # contexts ("rerun a query"), firing the soft hint as noise. The
    # explicit regex patterns require co-occurrence of rerun + directive/
    # backtest/stage; requires_subject gates the fuzzy fallback.
    regex_patterns:
      - "(?i)\\b(re[- ]?run|rerun)\\b.*\\b(directive|backtest|stage)\\b"
      - "(?i)\\breset_directive\\.py\\b"
      - "(?i)\\b__E15[0-9]\\b"
      - "(?i)\\b(re[- ]?run|rerun)\\s+[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b"
    semantic_tags:
      - {tag: "rerun", weight: 3}
      - {tag: "re-run", weight: 3}
      - {tag: "reset", weight: 1}
      - {tag: "cleanup", weight: 1}

  - id: session_start
    priority: 30
    enforcement: soft
    must_skill: session-start
    suppress_on_infra: true
    reason: "Starting a session with orientation to current priorities prevents missing critical blockers and stale-context drift."
    # session_start has no natural subject — it's a workflow action.
    # suppress_on_infra catches meta-tooling prompts about the skill itself
    # ("refactor session-start phases", "delete session_start entry") so
    # they don't fire the hint.
    regex_patterns:
      - "(?i)\\b(start|begin|kick\\s*off)\\s+(the\\s+|a\\s+)?session\\b"
      - "(?i)\\bsession[- ]?start\\b"
      - "(?i)\\b(orient|brief)\\s+me\\s+(to\\s+)?(the\\s+)?(current\\s+)?(state|priorities|tasks)\\b"
    semantic_tags:
      - {tag: "session_start", weight: 3}
      - {tag: "start_session", weight: 3}
      - {tag: "orient", weight: 1}
      - {tag: "priorities", weight: 1}

  - id: session_close
    priority: 30
    enforcement: soft
    must_skill: session-close
    suppress_on_infra: true
    reason: "Closing a session has a fixed commit/push/cleanup checklist."
    # session_close has no natural subject — it's a workflow action, not
    # entity-based. suppress_on_infra catches meta-tooling prompts about
    # the session-close skill itself ("delete the session_close hook",
    # "refactor session-close steps") so they don't fire the hint.
    regex_patterns:
      - "(?i)\\b(end|close|wrap\\s*up|finish)\\s+(the\\s+)?session\\b"
      - "(?i)\\bsession[- ]?close\\b"
    semantic_tags:
      - {tag: "session_close", weight: 3}
      - {tag: "wrap_up", weight: 3}

  - id: portfolio_edit
    priority: 40
    enforcement: soft
    must_skill: portfolio-selection-add
    requires_subject: true
    reason: "Portfolio add/remove writes to append-only MPS; must use the dedicated workflow."
    # Scope: IN_PORTFOLIO flag changes + control_panel selection CLI usage.
    # Generic "add X to portfolio" phrasing is owned by promote_strategy
    # (higher priority) — promote_strategy's regex covers that case so the
    # right routing fires regardless. Pre-fix, this intent's loose
    # "\\badd\\b.*\\bportfolio\\b" regex fired on prompts like "add
    # comments to portfolio loader file"; tightened to require an
    # explicit selection signal.
    regex_patterns:
      # Strong: strategy ID + IN_PORTFOLIO mention
      - "(?is)(?=.*\\b[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b)(?=.*\\bIN_PORTFOLIO\\b)"
      # IN_PORTFOLIO flag direct mention
      - "(?i)\\bIN_PORTFOLIO\\s*=\\s*[01]\\b"
      # control_panel CLI selection commands
      - "(?i)\\bcontrol_panel(\\.py|\\.bat)?\\s+--(select|deselect|deploy|drop|burn)\\b"
      # Explicit "flag X for portfolio analysis" idiom
      - "(?i)\\b(flag|select|deselect)\\s+\\S+(\\s+\\S+){0,3}\\s+for\\s+portfolio\\s+analysis\\b"
    semantic_tags:
      - {tag: "in_portfolio", weight: 3}
      - {tag: "portfolio_add", weight: 3}
      - {tag: "mps", weight: 1}
      - {tag: "master_portfolio_sheet", weight: 3}

  - id: launch_windows_supervised_task
    priority: 70
    enforcement: hard
    must_skill: launch-windows-supervised-task
    suppress_on_infra: true
    reason: "Launching a long-running Python daemon under Windows Task Scheduler has FIVE binding gotchas (pythonw vs python.exe, UTF-16 LE BOM XML, PYTHONPATH self-bootstrap, WinError 5 retry, .tmp cleanup-on-init) — each cost ~30 min of debugging on 2026-05-15 during Stage 5 launch. The skill captures the entire discipline. Hard enforcement chosen because re-discovering each gotcha is a multi-hour cost the skill makes 5 minutes."
    # No natural subject — workflow action. suppress_on_infra catches
    # meta-tooling prompts about the skill itself ("delete the
    # launch-windows-supervised-task skill", "refactor the XML
    # template") so they don't fire the hint. Strong regex on actual
    # task-registration verbs + Stage 5 / H2-shim / live-runner
    # vocabulary keeps false positives low.
    regex_patterns:
      # Direct schtasks / Task Scheduler verbs
      - "(?i)\\b(register|create|set\\s*up|deploy|launch|configure)\\s+(a\\s+)?(scheduled\\s+task|task\\s+scheduler\\s+(entry|task)|windows\\s+service|background\\s+(daemon|service|process))\\b"
      - "(?i)\\bschtasks(\\.exe)?\\s*/(create|run|change|update|end|delete)\\b"
      # PowerShell Scheduled-Task cmdlets that need elevation
      - "(?i)\\b(Register|Set|Get|Start|Stop|Unregister)-ScheduledTask(Action|Trigger|Principal|Settings)?\\b"
      # Stage 5 / Phase 7a-H2 / live-runner / shim vocabulary — direct mentions
      - "(?i)\\b(stage\\s*5|72\\s*h(our)?\\s*(field\\s*)?(stress|test|run))\\b"
      - "(?i)\\b(basket_pipeline\\s*live\\s*(adapter|runner)|h2[_ ]shim|TS_Execution\\s*shim)\\b"
      # Symptoms that mean the skill should fire
      - "(?i)\\b(STATUS_CONTROL_C_EXIT|0xC000013A|LastTaskResult)\\b"
      - "(?i)\\bpythonw\\.exe\\b"
    semantic_tags:
      - {tag: "scheduled_task", weight: 3}
      - {tag: "task_scheduler", weight: 3}
      - {tag: "schtasks", weight: 3}
      - {tag: "pythonw", weight: 3}
      - {tag: "supervised_task", weight: 3}
      - {tag: "long_running_daemon", weight: 2}
      - {tag: "background_process", weight: 1}
      - {tag: "stage_5", weight: 2}
      - {tag: "field_stress", weight: 2}
      - {tag: "h2_shim", weight: 3}
      - {tag: "live_runner", weight: 2}
      - {tag: "boot_trigger", weight: 2}
      - {tag: "logon_trigger", weight: 2}
      - {tag: "logontype", weight: 2}
      - {tag: "winerror_5", weight: 3}
      - {tag: "interactive_token", weight: 2}

  # ---------- RESEARCH WORKFLOWS ----------
  - id: hypothesis_testing
    priority: 55
    enforcement: soft
    must_skill: hypothesis-testing
    requires_subject: true
    reason: "Single-strategy hypothesis tests must derive from ranked hypothesis_tester.py insights — fabricating a hypothesis without that baseline is a known failure mode."
    # requires_subject gates the fuzzy path on a strategy/directive ID;
    # pure "run a hypothesis" without an attached strategy routes to noise.
    regex_patterns:
      - "(?i)\\b(run|execute|test)\\s+a?\\s*hypothesis\\b"
      - "(?i)\\bhypothesis[_ ]test(er|ing)?\\b"
      - "(?i)\\b(regime|session|direction)[- ]?(exclusion|filter|gate)\\s+(test|hypothesis)\\b"
    semantic_tags:
      - {tag: "hypothesis", weight: 2}
      - {tag: "regime_exclusion", weight: 3}
      - {tag: "filter_exclusion", weight: 3}
      - {tag: "direction_bias", weight: 2}

  - id: vault_discovery
    priority: 35
    enforcement: soft
    must_skill: vault-discovery
    suppress_on_infra: true
    reason: "Vault research-ideas and concepts accumulate independently from Trade_Scan findings; discovery runs prevent re-investigating settled questions and surface actionable ideas."
    regex_patterns:
      - "(?i)\\bvault[- ]?discovery\\b"
      - "(?i)\\b(check|scan|search|interrogate)\\s+(the\\s+)?vault\\s+(ideas?|research|concepts?)\\b"
      - "(?i)\\b(what'?s?|are\\s+there|any)\\s+(vault|research[- ]idea)s?\\s+(worth|to)\\s+(test|try|look\\s+at)\\b"
      - "(?i)\\b(research[- ]ideas?|vault\\s+concepts?)\\s+(worth|ready\\s+to)\\s+test(ing)?\\b"
    semantic_tags:
      - {tag: "vault_discovery", weight: 3}
      - {tag: "vault_ideas", weight: 3}
      - {tag: "research_ideas", weight: 2}
      - {tag: "vault_concepts", weight: 2}

  - id: basket_hypothesis_testing
    priority: 50
    enforcement: soft
    must_skill: hypothesis-testing
    requires_subject: true
    reason: "Basket hypothesis tests need the mechanic/architecture routing distinction — conflating the two classes causes wrong variant construction."
    regex_patterns:
      - "(?i)\\bbasket[- ]?hypothesis\\b"
      - "(?i)\\bH2[_ ]recycle@\\d+\\b"
      - "(?i)\\b(B1|B2)\\s+vs\\s+(B1|B2)\\b"
      - "(?i)\\b(mechanic|architecture)\\s+(variant|test|hypothesis)\\b"
    semantic_tags:
      - {tag: "basket_hypothesis", weight: 3}
      - {tag: "basket_variant", weight: 2}
      - {tag: "mechanic_variant", weight: 3}
      - {tag: "architecture_variant", weight: 3}

  - id: port_strategy
    priority: 45
    enforcement: soft
    must_skill: port-strategy
    suppress_on_infra: true
    reason: "Strategy porting requires namespace token validation and indicator-infra build order — skipping produces ungoverned strategy files."
    # suppress_on_infra catches meta-tooling prompts ("refactor the
    # port-strategy skill") so they don't fire the hint.
    regex_patterns:
      - "(?i)\\bport\\s+(a?\\s*)?(pine|strategy)\\b"
      - "(?i)\\b(build|create|write)\\s+(a\\s+new\\s+)?strategy\\.py\\b"
      - "(?i)\\bpine[_ ]?(script|indicator)?\\s*(to|->)\\s*(python|trade[_ ]?scan)\\b"
    semantic_tags:
      - {tag: "port_strategy", weight: 3}
      - {tag: "pine_port", weight: 3}
      - {tag: "strategy_build", weight: 2}
      - {tag: "new_strategy", weight: 1}

  - id: run_composite_portfolio
    priority: 45
    enforcement: soft
    must_skill: run-composite-portfolio
    requires_subject: true
    reason: "Composite portfolio construction requires capital wrappers and robustness suite in a specific order."
    regex_patterns:
      - "(?i)\\bcomposite[_ ]?portfolio\\b"
      - "(?i)\\bcombine\\s+\\d+\\+?\\s+(runs?|strategies)\\b"
      - "(?i)\\brun[- ]?composite\\b"
      - "(?i)\\bmulti[- ]?strategy\\s+portfolio\\b"
    semantic_tags:
      - {tag: "composite_portfolio", weight: 3}
      - {tag: "combine_runs", weight: 3}
      - {tag: "capital_wrapper", weight: 2}
      - {tag: "robustness_suite", weight: 2}

  - id: uniform_risk_capital_simulation
    priority: 40
    enforcement: soft
    must_skill: uniform-risk-capital-simulation
    requires_subject: true
    reason: "Uniform-risk simulation holds risk_per_trade constant across profiles — distinct from the standard composite flow where risk varies per profile."
    regex_patterns:
      - "(?i)\\buniform[- ]?risk\\b"
      - "(?i)\\bcapital[_ ]simulation\\b"
      - "(?i)\\brisk[_ ]per[_ ]trade.{0,20}uniform\\b"
    semantic_tags:
      - {tag: "uniform_risk", weight: 3}
      - {tag: "capital_simulation", weight: 3}
      - {tag: "fixed_risk", weight: 2}
      - {tag: "risk_per_trade", weight: 1}

  # ---------- PORTFOLIO MANAGEMENT ----------
  - id: portfolio_research
    priority: 40
    enforcement: soft
    must_skill: portfolio-research
    suppress_on_infra: true
    reason: "Portfolio research requires structured candidate-pool analysis with diversity controls — ad-hoc queries miss the three-pass model."
    regex_patterns:
      - "(?i)\\bportfolio[- ]?research\\b"
      - "(?i)\\b(analyze|review|audit)\\s+(the\\s+)?candidate\\s+pool\\b"
      - "(?i)\\b(which|what)\\s+(strategies|runs)\\s+(should|to)\\s+(go|add|include)\\s+(in|into)\\s+(the\\s+)?portfolio\\b"
    semantic_tags:
      - {tag: "portfolio_research", weight: 3}
      - {tag: "candidate_pool", weight: 3}
      - {tag: "portfolio_composition", weight: 2}

  - id: portfolio_selection_remove
    priority: 40
    enforcement: soft
    must_skill: portfolio-selection-remove
    requires_subject: true
    reason: "Portfolio removal clears the IN_PORTFOLIO flag in append-only ledgers — must use the governed workflow."
    regex_patterns:
      - "(?is)(?=.*\\b[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b)(?=.*\\b(remove|drop|deselect|take\\s+out)\\b.*\\bportfolio\\b)"
      - "(?i)\\bIN_PORTFOLIO\\s*=\\s*0\\b"
      - "(?i)\\b(remove|drop|deselect)\\s+\\S+(\\s+\\S+){0,3}\\s+from\\s+(the\\s+)?portfolio\\b"
    semantic_tags:
      - {tag: "portfolio_remove", weight: 3}
      - {tag: "deselect_strategy", weight: 3}
      - {tag: "in_portfolio_0", weight: 3}

  - id: format_excel_ledgers
    priority: 35
    enforcement: soft
    must_skill: format-excel-ledgers
    suppress_on_infra: true
    reason: "Formatting FSP/MPS requires format_excel_artifact.py with the correct profile — ad-hoc openpyxl calls break column widths and conditional formatting."
    regex_patterns:
      - "(?i)\\bformat[_ ]excel\\b"
      - "(?i)\\bformat.{0,20}(FSP|MPS|Filtered_Strategies_Passed|Master_Portfolio_Sheet)\\.xlsx\\b"
      - "(?i)\\b(refresh|fix|reformat)\\s+(the\\s+)?(spreadsheet|ledger|xlsx)\\s+(format|layout|columns)\\b"
    semantic_tags:
      - {tag: "format_ledger", weight: 3}
      - {tag: "excel_format", weight: 3}
      - {tag: "FSP_format", weight: 2}
      - {tag: "MPS_format", weight: 2}

  # ---------- MAINTENANCE ----------
  - id: pipeline_state_cleanup
    priority: 35
    enforcement: soft
    must_skill: pipeline-state-cleanup
    suppress_on_infra: true
    reason: "Pipeline artifact cleanup requires lineage-aware pruning against authoritative ledgers — blind deletion breaks run lineage."
    regex_patterns:
      - "(?i)\\bpipeline[- ]?state[- ]?cleanup\\b"
      - "(?i)\\b(prune|clean\\s*up)\\s+(stale\\s+)?(runs|backtests|artifacts)\\b"
      - "(?i)\\blineage[- ]?aware\\s+(prune|cleanup)\\b"
    semantic_tags:
      - {tag: "pipeline_cleanup", weight: 3}
      - {tag: "stale_runs", weight: 2}
      - {tag: "prune_artifacts", weight: 2}
      - {tag: "lineage", weight: 1}

  - id: repo_cleanup_refactor
    priority: 30
    enforcement: soft
    must_skill: repo-cleanup-refactor
    suppress_on_infra: true
    reason: "Repo cleanup covers worktrees, stale branches, root-untracked files, and cross-repo state orphans — ad-hoc cleanup misses the cross-repo scope."
    regex_patterns:
      - "(?i)\\brepo[- ]?cleanup\\b"
      - "(?i)\\b(clean\\s*up|prune)\\s+(stale\\s+)?(worktrees?|branches?)\\b"
      - "(?i)\\b(extract|deduplicate)\\s+(duplicate|shared)\\s+function\\b"
    semantic_tags:
      - {tag: "repo_cleanup", weight: 3}
      - {tag: "stale_branches", weight: 2}
      - {tag: "worktree_cleanup", weight: 2}
      - {tag: "code_dry", weight: 2}

  - id: system_health_maintenance
    priority: 35
    enforcement: soft
    must_skill: system-health-maintenance
    suppress_on_infra: true
    reason: "System health audit has a defined Phase 1-4 workflow covering vault management and recovery operations."
    regex_patterns:
      - "(?i)\\bsystem[- ]?health\\b"
      - "(?i)\\bhealth[- ]?audit\\b"
      - "(?i)\\bworkspace[- ]?hygiene\\b"
    semantic_tags:
      - {tag: "system_health", weight: 3}
      - {tag: "health_audit", weight: 3}
      - {tag: "workspace_hygiene", weight: 2}
      - {tag: "recovery_operation", weight: 2}

  - id: skill_maintenance
    priority: 30
    enforcement: soft
    must_skill: skill-maintenance
    suppress_on_infra: true
    reason: "Skill audits need the governed 13-check workflow to catch friction-log drift, archive cap violations, and reference-link rot."
    regex_patterns:
      - "(?i)\\bskill[- ]?maintenance\\b"
      - "(?i)\\baudit\\s+(the\\s+)?skills?\\b"
      - "(?i)\\bfriction[- ]?log\\s+(drift|audit|check)\\b"
    semantic_tags:
      - {tag: "skill_maintenance", weight: 3}
      - {tag: "skill_audit", weight: 3}
      - {tag: "friction_log", weight: 2}

  - id: sanity_check
    priority: 20
    enforcement: soft
    must_skill: sanity
    suppress_on_infra: true
    reason: "A fast read over a finalized plan or staged change — what is missing, risky, or forgotten — caught before it costs a run or a commit."
    # sanity has no natural subject — it's a review action over the current
    # plan/diff. suppress_on_infra catches meta-tooling prompts about the
    # sanity skill itself ("refactor the sanity skill", "delete sanity entry").
    # Regex kept to tight exact phrases so generic "missing"/"forgot" usage
    # doesn't leak the hint. Lowest priority (20) so a real workflow skill
    # always wins on overlap.
    regex_patterns:
      - "(?i)\\bsanity[- ]?check\\b"
      - "(?i)\\bam\\s+i\\s+missing\\s+(any\\s*thing|something)\\b"
      - "(?i)\\b(did|have)\\s+i\\s+miss(ed)?\\s+(a\\s+step|any\\s*thing|something)\\b"
      - "(?i)\\banything\\s+(i\\s+)?forgot\\b"
      - "(?i)\\bsecond\\s+opinion\\b"
    semantic_tags:
      - {tag: "sanity_check", weight: 3}
      - {tag: "second_opinion", weight: 3}

  # ---------- MEMORY HINTS (Task C, 09_incident_reports/ENFORCEMENT_PLAN_2026-05-27_CLOSED.md) ----------
  # Early-warning advisories that surface a specific memory entry before
  # the operator authors a directive the admission gate would reject.
  # Soft enforcement only — memory hints don't carry blocking semantics.

  - id: test_window_signal_class
    priority: 40
    enforcement: soft
    memory_hint: feedback_test_window_must_match_signal_class
    suppress_on_infra: true
    reason: "Calendar windows + cointegration signals must match the screener's per-pair window, not a fixed 2-year span. Failure mode #2 in the enforcement plan."
    regex_patterns:
      # Test-window phrasing co-occurring with cointegration/regime vocabulary.
      - "(?i)\\b(test\\s+window|date\\s+range|backtest\\s+period|2[- ]year|calendar(\\s+window)?)\\b.{0,80}\\b(cointegrat|regime|aligned)\\w*"
      - "(?i)\\b(cointegrat|regime|aligned)\\w*\\b.{0,80}\\b(test\\s+window|date\\s+range|backtest\\s+period|2[- ]year|calendar(\\s+window)?)\\b"
    semantic_tags:
      - {tag: "test_window", weight: 3}
      - {tag: "backtest_period", weight: 2}
      - {tag: "date_range", weight: 2}
      - {tag: "cointegrated", weight: 3}
      - {tag: "cointegration", weight: 3}
      - {tag: "regime", weight: 1}

  - id: governance_as_evaluator
    priority: 40
    enforcement: soft
    memory_hint: feedback_screening_rules_for_research
    suppress_on_infra: true
    reason: "Governance verdicts (CORE/WATCH/FAIL) are deployment gates, not research evaluators. Using them as research signals near-retired a strategy with real edge. Failure mode #3 in the enforcement plan."
    regex_patterns:
      # Governance verdict tokens used as evaluation language.
      - "(?i)\\b(CORE|WATCH|FAIL)\\b.{0,40}\\b(evaluator|rank|filter|screen|select|score)\\b"
      - "(?i)\\b(evaluator|rank|filter|screen|select|score)\\b.{0,40}\\b(CORE|WATCH|FAIL)\\b"
      - "(?i)\\bgovernance\\s+(verdict|metric|score|ranking)\\b"
    semantic_tags:
      - {tag: "governance", weight: 2}
      - {tag: "evaluator", weight: 3}
      - {tag: "verdict", weight: 2}
      - {tag: "rank", weight: 1}
      - {tag: "screen", weight: 1}
