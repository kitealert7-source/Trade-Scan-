# INTENT_INDEX.yaml
# ------------------------------------------------------------------
# Maps natural-language user intents to skills/workflows that must be
# invoked. Consumed by .claude/hooks/intent_injector.py on every
# UserPromptSubmit event.
#
# Fields per intent:
#   id             : unique slug (used in telemetry log)
#   priority       : int, higher wins on overlap
#   enforcement    : "hard" | "soft"
#                    hard -> MANDATORY blocking directive
#                    soft -> advisory skill hint
#   must_skill     : slug under .claude/skills/ (resolves to .claude/skills/<slug>/SKILL.md)
#   threshold      : optional int (default 3) for fuzzy score
#   regex_patterns : authoritative; any hit -> score 100
#   semantic_tags  : fuzzy fallback, each has {tag, weight}
#                    exact word-boundary hit -> weight * 2
#                    substring-only hit      -> weight * 1
#                    proximity bonus (+3) if two distinct exact hits
#                    lie within <=3 tokens of each other
#
# Cap: MAX_INTENTS = 25. Adding a 26th requires merging or deleting
# an existing entry. Index growth past that point kills maintainability.
# ------------------------------------------------------------------

intents:

  # ---------- HARD ENFORCEMENT ----------
  - id: engine_change
    priority: 100
    enforcement: hard
    must_skill: update-vault
    expected_file_category: engine
    # File-scope filter (added 2026-05-03 after 10+ misfires during the
    # NEWS-execution work). Even when the prompt text matches engine
    # phrasing, the intent must ALSO see at least one changed file in
    # the frozen-engine scope or it suppresses. Mutable shared infra
    # (engines/, tools/, governance/) does NOT trigger by itself.
    frozen_path_only: true
    # Frozen scope (regex anchored at repo-root-relative path):
    #   engine_dev/universal_research_engine/<version>/...
    #   vault/engines/...
    #   any engine_manifest.json
    #   any contract.json
    # Mutable shared infra (engines/, tools/, governance/, tests/, outputs/)
    # is explicitly NOT in scope unless it ALSO touches one of the above
    # in the same change set.
    frozen_paths:
      - "^engine_dev/universal_research_engine/[^/]+/"
      - "^vault/engines/"
      - "(^|/)engine_manifest\\.json$"
      - "(^|/)contract\\.json$"
    # Threshold raised from default 3 to 6 after a misfire on 2026-04-24:
    # an indicator-only commit matched the bare tag "engine" (weight 2,
    # word-boundary score 4) in a sentence that explicitly said NOT to
    # touch engine work. Regex patterns continue to hard-fire exact
    # engine phrases; fuzzy fallback now requires either a
    # high-specificity solo hit (execution_loop / engine_registry /
    # v1.5* / v1.6*, each scoring 6) or "engine" co-occurring with a
    # second engine-scope tag (vault, canonical, frozen, manifest).
    threshold: 6
    reason: "Engine build/modify requires vault push + manifest refresh. Engine v1.5.6 shipped unvaulted for days -- root cause: no enforced workflow."
    regex_patterns:
      - "(?i)\\b(new|build|bump|promote|release|freeze|finalize|ship)\\s+(the\\s+)?engine\\b"
      - "(?i)\\bengine\\s+v?\\d+[._]\\d+[._]\\d+\\b"
      - "(?i)\\b(push|vault|snapshot|publish)\\s+(the\\s+|this\\s+)?engine\\b"
      - "(?i)\\bengine_dev/"
      - "(?i)\\bENGINE_VERSION\\b"
    semantic_tags:
      - {tag: "engine", weight: 2}
      - {tag: "vault", weight: 2}
      - {tag: "v1.5", weight: 3}
      - {tag: "v1.6", weight: 3}
      - {tag: "canonical", weight: 2}
      - {tag: "frozen", weight: 1}
      - {tag: "manifest", weight: 1}
      - {tag: "execution_loop", weight: 3}
      - {tag: "engine_registry", weight: 3}

  - id: promote_strategy
    priority: 90
    enforcement: hard
    must_skill: promote
    expected_file_category: strategy
    threshold: 8
    reason: "Promotion touches append-only ledgers, vault, FSM state. Ad-hoc promotion has left orphan strategies and stale PORTFOLIO_COMPLETE markers."
    # Hard-fire requires BOTH a strategy identifier (FOO_V<n>_P<n>) AND an
    # explicit promote/lifecycle keyword in the same prompt. Bare mentions
    # of "promote" or "burn_in" in code, commit messages, or discussion no
    # longer trigger routing on their own -- fuzzy threshold (8) is above
    # any single tag's exact-match weight (6 max).
    regex_patterns:
      # Co-occurrence: strategy-ID token anywhere + lifecycle keyword anywhere.
      - "(?is)(?=.*\\b[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b)(?=.*\\b(promote|promoting|promotion|burn[- ]?in|BURN_IN|deployable|portfolio[_ ]complete|go[- ]?live|to[ _-]?waiting)\\b)"
      # Direct phrasings with inline identifier.
      - "(?i)\\bpromote\\s+[A-Z0-9][A-Z0-9_]*_V\\d+_P\\d+\\b"
      - "(?i)\\b(move|send|advance)\\s+[A-Z0-9][A-Z0-9_]*\\s+to\\s+(live|waiting|burn[- ]?in)\\b"
    semantic_tags:
      - {tag: "promote", weight: 3}
      - {tag: "burn_in", weight: 3}
      - {tag: "burnin", weight: 3}
      - {tag: "waiting", weight: 2}
      - {tag: "deployable", weight: 2}
      - {tag: "portfolio_complete", weight: 3}

  # ---------- SOFT REMINDERS ----------
  - id: run_directive
    priority: 50
    enforcement: soft
    must_skill: execute-directives
    reason: "Pipeline execution has a mandatory pre-directive gate and sequential-only rule."
    regex_patterns:
      - "(?i)\\brun_pipeline\\.py\\b"
      - "(?i)\\brun\\s+(the\\s+)?directive\\b"
      - "(?i)\\b(execute|kick\\s*off|start)\\s+(directive|backtest)\\b"
    semantic_tags:
      - {tag: "directive", weight: 2}
      - {tag: "pipeline", weight: 1}
      - {tag: "backtest", weight: 1}
      - {tag: "stage1", weight: 2}
      - {tag: "stage3", weight: 2}

  - id: rerun_backtest
    priority: 55
    enforcement: soft
    must_skill: rerun-backtest
    reason: "Re-run requires ledger cleanup + reset_directive before pipeline re-entry; skipping causes stale rows."
    regex_patterns:
      - "(?i)\\b(re[- ]?run|rerun)\\b.*\\b(directive|backtest|stage)\\b"
      - "(?i)\\breset_directive\\.py\\b"
      - "(?i)\\b__E15[0-9]\\b"
    semantic_tags:
      - {tag: "rerun", weight: 3}
      - {tag: "re-run", weight: 3}
      - {tag: "reset", weight: 1}
      - {tag: "cleanup", weight: 1}

  - id: session_close
    priority: 30
    enforcement: soft
    must_skill: session-close
    reason: "Closing a session has a fixed commit/push/cleanup checklist."
    regex_patterns:
      - "(?i)\\b(end|close|wrap\\s*up|finish)\\s+(the\\s+)?session\\b"
      - "(?i)\\bsession[- ]?close\\b"
    semantic_tags:
      - {tag: "session_close", weight: 3}
      - {tag: "wrap_up", weight: 3}

  - id: portfolio_edit
    priority: 40
    enforcement: soft
    must_skill: portfolio-selection-add
    reason: "Portfolio add/remove writes to append-only MPS; must use the dedicated workflow."
    regex_patterns:
      - "(?i)\\badd\\b.*\\bportfolio\\b"
      - "(?i)\\bportfolio\\b.*\\b(add|include|admit)\\b"
    semantic_tags:
      - {tag: "portfolio_add", weight: 3}
      - {tag: "mps", weight: 1}
      - {tag: "master_portfolio_sheet", weight: 3}
